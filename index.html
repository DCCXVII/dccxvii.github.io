<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Organizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  min-height: 100vh;
}
.wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 100px; }
h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  border-bottom: 1px solid #fff;
  padding-bottom: 16px;
}
button {
  background: #000;
  color: #fff;
  border: 1px solid #fff;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  font-family: inherit;
}
button:hover { background: #fff; color: #000; }
button:disabled { opacity: 0.3; cursor: default; }
button:disabled:hover { background: #000; color: #fff; }
button.primary { background: #fff; color: #000; }
button.primary:hover { background: #000; color: #fff; }
.hidden { display: none !important; }
#login-screen { text-align: center; padding-top: 120px; }
#login-screen p { color: #aaa; margin: 14px 0 28px; font-size: 14px; }
#login-screen button { padding: 12px 26px; font-size: 14px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
}
.pl-card {
  border: 1px solid #333;
  border-radius: 6px;
  padding: 10px;
  cursor: pointer;
}
.pl-card:hover { border-color: #fff; }
.pl-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: #111;
  border-radius: 4px;
  margin-bottom: 8px;
}
.pl-card .name { font-size: 13px; font-weight: 600; line-height: 1.3; }
.pl-card .count { font-size: 11px; color: #888; margin-top: 4px; }
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #333;
}
.toolbar button { font-size: 12px; padding: 7px 12px; }
.toolbar .sep { width: 1px; background: #333; margin: 0 4px; }
.back-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.back-row img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
.back-row .pl-title { font-size: 18px; font-weight: 700; }
.back-row .pl-sub { font-size: 12px; color: #888; }
#track-list { list-style: none; }
.track-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 6px;
  border-bottom: 1px solid #222;
}
.track-row.dragging { opacity: 0.3; }
.track-row.drag-over { border-top: 2px solid #fff; }
.handle {
  cursor: grab;
  color: #555;
  font-size: 16px;
  width: 18px;
  text-align: center;
  user-select: none;
  flex-shrink: 0;
}
.handle:active { cursor: grabbing; }
.t-art { width: 40px; height: 40px; border-radius: 3px; object-fit: cover; background: #111; flex-shrink: 0; }
.t-info { flex: 1; min-width: 0; }
.t-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-artist { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-meta { font-size: 12px; color: #888; flex-shrink: 0; width: 50px; text-align: right; }
.t-pop { font-size: 11px; color: #555; flex-shrink: 0; width: 36px; text-align: right; }
.spell-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 18px;
  padding: 14px;
  border: 1px solid #333;
  border-radius: 6px;
}
.spell-row input {
  flex: 1;
  background: #000;
  border: 1px solid #444;
  color: #fff;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 4px;
  text-transform: uppercase;
  font-family: inherit;
}
.spell-row input:focus { outline: none; border-color: #fff; }
.save-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  border-top: 1px solid #fff;
  padding: 14px 20px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
.status {
  font-size: 12px;
  color: #888;
  text-align: center;
  margin-top: 10px;
  min-height: 16px;
}
.status.err { color: #fff; font-weight: 600; }
.loading { text-align: center; padding: 60px 0; color: #888; font-size: 13px; }
.note {
  font-size: 11px;
  color: #666;
  margin-top: 4px;
}
</style>
</head>
<body>

<div class="wrap">

  <div id="login-screen">
    <h1>Playlist Organizer</h1>
    <p>Connect your Spotify account to reorder, sort, and save your playlists.</p>
    <button class="primary" id="login-btn">Connect with Spotify</button>
    <p class="status" id="login-status"></p>
  </div>

  <div id="app-screen" class="hidden">

    <div class="top">
      <h1>Playlist Organizer</h1>
      <button id="logout-btn">Log out</button>
    </div>

    <div id="playlist-picker">
      <h2>Your playlists</h2>
      <div id="pl-grid" class="grid"></div>
      <div id="pl-loading" class="loading hidden">Loading playlists...</div>
    </div>

    <div id="editor" class="hidden">
      <button id="back-btn">&larr; Back to playlists</button>
      <div class="back-row" style="margin-top:16px;">
        <img id="ed-art" src="" alt="">
        <div>
          <div class="pl-title" id="ed-title"></div>
          <div class="pl-sub" id="ed-sub"></div>
        </div>
      </div>

      <div class="toolbar">
        <button data-sort="alpha-az">A &rarr; Z</button>
        <button data-sort="alpha-za">Z &rarr; A</button>
        <div class="sep"></div>
        <button data-sort="artist">Artist</button>
        <button data-sort="album">Album</button>
        <div class="sep"></div>
        <button data-sort="date-old">Oldest first</button>
        <button data-sort="date-new">Newest first</button>
        <div class="sep"></div>
        <button data-sort="dur-asc">Shortest first</button>
        <button data-sort="dur-desc">Longest first</button>
        <div class="sep"></div>
        <button data-sort="pop-asc">Underground first</button>
        <button data-sort="pop-desc">Mainstream first</button>
      </div>

      <div class="spell-row">
        <input type="text" id="spell-input" placeholder="SPELL SOMETHING" maxlength="40">
        <button id="spell-btn">Arrange</button>
      </div>
      <div class="note" id="spell-note" style="margin: -12px 0 18px 2px;"></div>

      <ul id="track-list"></ul>

      <div class="status" id="ed-status"></div>
    </div>

  </div>

</div>

<div class="save-bar hidden" id="save-bar">
  <button id="save-overwrite-btn">Save (overwrite original)</button>
  <button class="primary" id="save-new-btn">Save as new playlist</button>
</div>

<script>
const CLIENT_ID = "fcc60831d3974fec8770b2f9af452de8";
const REDIRECT_URI = "https://dccxvii.github.io";
const SCOPES = "playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private";
const API = "https://api.spotify.com/v1";

let accessToken = null;
let currentUser = null;
let currentPlaylist = null;
let tracks = [];

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function sha256(plain) {
  const data = new TextEncoder().encode(plain);
  return await crypto.subtle.digest("SHA-256", data);
}

function randomString(len) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let out = "";
  const arr = crypto.getRandomValues(new Uint8Array(len));
  for (let i = 0; i < len; i++) out += chars[arr[i] % chars.length];
  return out;
}

async function startLogin() {
  const verifier = randomString(64);
  const challenge = b64url(await sha256(verifier));
  sessionStorage.setItem("pkce_verifier", verifier);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge
  });
  window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
}

async function exchangeCodeForToken(code) {
  const verifier = sessionStorage.getItem("pkce_verifier");
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "authorization_code",
    code: code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body.toString()
  });
  if (!res.ok) throw new Error("Token exchange failed");
  const data = await res.json();
  accessToken = data.access_token;
  if (data.refresh_token) localStorage.setItem("refresh_token", data.refresh_token);
  localStorage.setItem("access_token", data.access_token);
  localStorage.setItem("token_expires", Date.now() + data.expires_in * 1000);
}

async function refreshAccessToken() {
  const refreshToken = localStorage.getItem("refresh_token");
  if (!refreshToken) return false;
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "refresh_token",
    refresh_token: refreshToken
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body.toString()
  });
  if (!res.ok) return false;
  const data = await res.json();
  accessToken = data.access_token;
  if (data.refresh_token) localStorage.setItem("refresh_token", data.refresh_token);
  localStorage.setItem("access_token", data.access_token);
  localStorage.setItem("token_expires", Date.now() + data.expires_in * 1000);
  return true;
}

async function apiFetch(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers, { Authorization: "Bearer " + accessToken });
  let res = await fetch(API + path, opts);
  if (res.status === 401) {
    const ok = await refreshAccessToken();
    if (ok) {
      opts.headers.Authorization = "Bearer " + accessToken;
      res = await fetch(API + path, opts);
    }
  }
  if (res.status === 429) {
    const retryAfter = parseInt(res.headers.get("Retry-After") || "2", 10);
    await new Promise(r => setTimeout(r, (retryAfter + 1) * 1000));
    return apiFetch(path, opts);
  }
  return res;
}

function showApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app-screen").classList.remove("hidden");
}

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");

  if (code) {
    document.getElementById("login-status").textContent = "Connecting...";
    try {
      await exchangeCodeForToken(code);
      window.history.replaceState({}, document.title, window.location.pathname);
      showApp();
      loadUserAndPlaylists();
    } catch (e) {
      document.getElementById("login-status").textContent = "Could not connect. Try again.";
    }
    return;
  }

  const savedToken = localStorage.getItem("access_token");
  const expires = parseInt(localStorage.getItem("token_expires") || "0", 10);
  if (savedToken && Date.now() < expires) {
    accessToken = savedToken;
    showApp();
    loadUserAndPlaylists();
  } else if (localStorage.getItem("refresh_token")) {
    const ok = await refreshAccessToken();
    if (ok) {
      showApp();
      loadUserAndPlaylists();
    }
  }
}

async function loadUserAndPlaylists() {
  const meRes = await apiFetch("/me");
  currentUser = await meRes.json();
  await loadPlaylists();
}

async function loadPlaylists() {
  const grid = document.getElementById("pl-grid");
  const loading = document.getElementById("pl-loading");
  grid.innerHTML = "";
  loading.classList.remove("hidden");

  let all = [];
  let url = "/me/playlists?limit=50";
  while (url) {
    const res = await apiFetch(url.startsWith("/me") ? url : url.replace(API, ""));
    const data = await res.json();
    all = all.concat(data.items || []);
    url = data.next;
  }

  loading.classList.add("hidden");
  grid.innerHTML = "";
  all.forEach(pl => {
    if (!pl) return;
    const card = document.createElement("div");
    card.className = "pl-card";
    const img = (pl.images && pl.images[0]) ? pl.images[0].url : "";
    card.innerHTML =
      '<img src="' + img + '" alt="">' +
      '<div class="name">' + escapeHtml(pl.name) + '</div>' +
      '<div class="count">' + (pl.tracks ? pl.tracks.total : 0) + ' tracks</div>';
    card.addEventListener("click", () => openPlaylist(pl));
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

async function openPlaylist(pl) {
  currentPlaylist = pl;
  document.getElementById("playlist-picker").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");
  document.getElementById("ed-title").textContent = pl.name;
  document.getElementById("ed-art").src = (pl.images && pl.images[0]) ? pl.images[0].url : "";
  document.getElementById("ed-sub").textContent = "Loading tracks...";
  document.getElementById("track-list").innerHTML = "";
  document.getElementById("save-bar").classList.add("hidden");

  tracks = [];
  let url = "/playlists/" + pl.id + "/items?limit=50";
  while (url) {
    const res = await apiFetch(url.startsWith("/playlists") ? url : url.replace(API, ""));
    const data = await res.json();
    (data.items || []).forEach(it => {
      const item = it.item || it.track;
      if (!item || item.type === "episode" || it.is_local) return;
      tracks.push({
        uri: item.uri,
        id: item.id,
        name: item.name,
        artists: (item.artists || []).map(a => a.name).join(", "),
        artistSort: (item.artists && item.artists[0]) ? item.artists[0].name : "",
        album: item.album ? item.album.name : "",
        albumId: item.album ? item.album.id : "",
        releaseDate: item.album ? item.album.release_date : "",
        durationMs: item.duration_ms || 0,
        popularity: (typeof item.popularity === "number") ? item.popularity : null,
        image: (item.album && item.album.images && item.album.images[2]) ? item.album.images[2].url : ((item.album && item.album.images && item.album.images[0]) ? item.album.images[0].url : "")
      });
    });
    url = data.next;
  }

  document.getElementById("ed-sub").textContent = tracks.length + " tracks";
  document.getElementById("save-bar").classList.remove("hidden");
  renderTracks();
}

function formatDuration(ms) {
  const totalSec = Math.round(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min + ":" + String(sec).padStart(2, "0");
}

function renderTracks() {
  const list = document.getElementById("track-list");
  list.innerHTML = "";
  tracks.forEach((t, idx) => {
    const li = document.createElement("li");
    li.className = "track-row";
    li.draggable = true;
    li.dataset.idx = idx;

    const popText = (t.popularity === null) ? "—" : t.popularity;

    li.innerHTML =
      '<span class="handle">&#8942;&#8942;</span>' +
      '<img class="t-art" src="' + t.image + '" alt="">' +
      '<div class="t-info">' +
        '<div class="t-name">' + escapeHtml(t.name) + '</div>' +
        '<div class="t-artist">' + escapeHtml(t.artists) + (t.album ? " &middot; " + escapeHtml(t.album) : "") + '</div>' +
      '</div>' +
      '<div class="t-pop" title="Popularity score">' + popText + '</div>' +
      '<div class="t-meta">' + formatDuration(t.durationMs) + '</div>';

    list.appendChild(li);
  });
  attachDragHandlers();
}

function attachDragHandlers() {
  const list = document.getElementById("track-list");
  let dragSrcIdx = null;

  list.querySelectorAll(".track-row").forEach(row => {
    row.addEventListener("dragstart", e => {
      dragSrcIdx = parseInt(row.dataset.idx, 10);
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      list.querySelectorAll(".track-row").forEach(r => r.classList.remove("drag-over"));
    });
    row.addEventListener("dragover", e => {
      e.preventDefault();
      row.classList.add("drag-over");
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("drag-over");
    });
    row.addEventListener("drop", e => {
      e.preventDefault();
      const targetIdx = parseInt(row.dataset.idx, 10);
      if (dragSrcIdx === null || targetIdx === dragSrcIdx) return;
      const moved = tracks.splice(dragSrcIdx, 1)[0];
      tracks.splice(targetIdx, 0, moved);
      renderTracks();
    });
  });
}

function naturalCompare(a, b) {
  const re = /(\d+|\D+)/g;
  const ax = (a || "").match(re) || [];
  const bx = (b || "").match(re) || [];
  while (ax.length && bx.length) {
    const an = ax.shift();
    const bn = bx.shift();
    const aIsNum = /^\d+$/.test(an);
    const bIsNum = /^\d+$/.test(bn);
    if (aIsNum && bIsNum) {
      const diff = parseInt(an, 10) - parseInt(bn, 10);
      if (diff !== 0) return diff;
    } else {
      if (aIsNum && !bIsNum) return -1;
      if (!aIsNum && bIsNum) return 1;
      const cmp = an.localeCompare(bn, undefined, { sensitivity: "base" });
      if (cmp !== 0) return cmp;
    }
  }
  return ax.length - bx.length;
}

function sortTracks(mode) {
  const arr = tracks.slice();
  switch (mode) {
    case "alpha-az":
      arr.sort((a, b) => naturalCompare(a.name, b.name));
      break;
    case "alpha-za":
      arr.sort((a, b) => naturalCompare(b.name, a.name));
      break;
    case "artist":
      arr.sort((a, b) => naturalCompare(a.artistSort, b.artistSort) || naturalCompare(a.name, b.name));
      break;
    case "album":
      arr.sort((a, b) => {
        if (a.albumId && b.albumId && a.albumId === b.albumId) return 0;
        return naturalCompare(a.album, b.album);
      });
      const grouped = [];
      const seen = new Set();
      arr.forEach(t => {
        if (seen.has(t.albumId)) return;
        seen.add(t.albumId);
        const albumTracks = tracks.filter(x => x.albumId === t.albumId);
        grouped.push(...albumTracks);
      });
      tracks = grouped;
      renderTracks();
      return;
    case "date-old":
      arr.sort((a, b) => (a.releaseDate || "").localeCompare(b.releaseDate || ""));
      break;
    case "date-new":
      arr.sort((a, b) => (b.releaseDate || "").localeCompare(a.releaseDate || ""));
      break;
    case "dur-asc":
      arr.sort((a, b) => a.durationMs - b.durationMs);
      break;
    case "dur-desc":
      arr.sort((a, b) => b.durationMs - a.durationMs);
      break;
    case "pop-asc":
      arr.sort((a, b) => (a.popularity === null ? 999 : a.popularity) - (b.popularity === null ? 999 : b.popularity));
      break;
    case "pop-desc":
      arr.sort((a, b) => (b.popularity === null ? -1 : b.popularity) - (a.popularity === null ? -1 : a.popularity));
      break;
  }
  tracks = arr;
  renderTracks();
}

function spellOut(word) {
  word = word.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
  if (!word) return;

  const used = new Set();
  const placed = [];
  const noteEl = document.getElementById("spell-note");
  let missingLetter = null;

  for (let i = 0; i < word.length; i++) {
    const letter = word[i];
    let found = null;
    for (let j = 0; j < tracks.length; j++) {
      if (used.has(j)) continue;
      const name = tracks[j].name || "";
      const firstChar = name.trim().charAt(0).toUpperCase();
      if (firstChar === letter) {
        found = j;
        break;
      }
    }
    if (found === null) {
      missingLetter = letter;
      break;
    }
    used.add(found);
    placed.push(found);
  }

  if (missingLetter) {
    noteEl.textContent = "No unused track starts with \"" + missingLetter + "\". Nothing changed.";
    return;
  }

  const remaining = tracks.map((t, i) => i).filter(i => !used.has(i));
  const newOrder = placed.concat(remaining).map(i => tracks[i]);
  tracks = newOrder;
  noteEl.textContent = "Spelled \"" + word + "\" using the first " + word.length + " slots. Rest of the playlist is untouched.";
  renderTracks();
}

async function saveOverwrite() {
  await pushTracksToPlaylist(currentPlaylist.id);
}

async function saveAsNew() {
  const statusEl = document.getElementById("ed-status");
  statusEl.textContent = "Creating new playlist...";
  statusEl.className = "status";

  const res = await apiFetch("/me/playlists", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: currentPlaylist.name + " (organized)",
      description: "Reorganized with Playlist Organizer",
      public: false
    })
  });

  if (!res.ok) {
    statusEl.textContent = "Could not create the new playlist.";
    statusEl.className = "status err";
    return;
  }

  const newPl = await res.json();
  await pushTracksToPlaylist(newPl.id, true);
}

async function pushTracksToPlaylist(playlistId, isNew) {
  const statusEl = document.getElementById("ed-status");
  statusEl.textContent = "Saving...";
  statusEl.className = "status";

  const uris = tracks.map(t => t.uri);
  const chunkSize = 100;

  try {
    if (isNew) {
      for (let i = 0; i < uris.length; i += chunkSize) {
        const chunk = uris.slice(i, i + chunkSize);
        const res = await apiFetch("/playlists/" + playlistId + "/items", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uris: chunk })
        });
        if (!res.ok) throw new Error("add items failed");
      }
    } else {
      const firstChunk = uris.slice(0, chunkSize);
      let res = await apiFetch("/playlists/" + playlistId + "/items", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uris: firstChunk })
      });
      if (!res.ok) throw new Error("replace failed");

      for (let i = chunkSize; i < uris.length; i += chunkSize) {
        const chunk = uris.slice(i, i + chunkSize);
        res = await apiFetch("/playlists/" + playlistId + "/items", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uris: chunk })
        });
        if (!res.ok) throw new Error("append failed");
      }
    }

    statusEl.textContent = isNew ? "Saved as a new playlist." : "Saved. The original playlist has been updated.";
    statusEl.className = "status";
  } catch (e) {
    statusEl.textContent = "Something went wrong while saving. Your changes were not fully applied.";
    statusEl.className = "status err";
  }
}

document.getElementById("login-btn").addEventListener("click", startLogin);

document.getElementById("logout-btn").addEventListener("click", () => {
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
  localStorage.removeItem("token_expires");
  window.location.reload();
});

document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("editor").classList.add("hidden");
  document.getElementById("save-bar").classList.add("hidden");
  document.getElementById("playlist-picker").classList.remove("hidden");
  document.getElementById("spell-note").textContent = "";
  document.getElementById("spell-input").value = "";
});

document.querySelectorAll(".toolbar button").forEach(btn => {
  btn.addEventListener("click", () => sortTracks(btn.dataset.sort));
});

document.getElementById("spell-btn").addEventListener("click", () => {
  spellOut(document.getElementById("spell-input").value);
});
document.getElementById("spell-input").addEventListener("keydown", e => {
  if (e.key === "Enter") spellOut(e.target.value);
});

document.getElementById("save-overwrite-btn").addEventListener("click", saveOverwrite);
document.getElementById("save-new-btn").addEventListener("click", saveAsNew);

init();
</script>
</body>
</html>

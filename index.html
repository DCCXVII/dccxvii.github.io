<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Organizer</title>
<style>
body { font-family: sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 20px; }
h1, h2, h3 { font-weight: normal; margin-top: 0; }
button, input, select { border: 1px solid #000000; background-color: #ffffff; color: #000000; padding: 10px 15px; cursor: pointer; font-family: inherit; font-size: 14px; margin: 5px; outline: none; }
button:hover, input[type="submit"]:hover { background-color: #000000; color: #ffffff; }
input[type="text"] { cursor: text; }
.hidden { display: none !important; }
#playlists-container { display: flex; flex-direction: column; gap: 10px; max-width: 600px; }
.playlist-card { border: 1px solid #000000; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background-color 0.2s; }
.playlist-card:hover { background-color: #000000; color: #ffffff; }
#tracks-container { margin-top: 20px; border: 1px solid #000000; max-width: 800px; }
.track-row { display: flex; align-items: center; border-bottom: 1px solid #000000; padding: 10px; background-color: #ffffff; cursor: grab; }
.track-row:last-child { border-bottom: none; }
.track-row.dragging { opacity: 0.5; }
.handle { margin-right: 15px; font-size: 20px; user-select: none; }
.track-info { flex-grow: 1; display: flex; flex-direction: column; }
.track-name { font-weight: bold; }
.track-meta { font-size: 12px; margin-top: 4px; }
.controls { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; max-width: 800px; }
.section-border { border: 1px solid #000000; padding: 15px; margin-bottom: 20px; max-width: 768px; }
.flex-row { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>
<div id="login-view">
<h1>Login</h1>
<button id="login-btn">Connect</button>
</div>
<div id="playlists-view" class="hidden">
<h1>Select</h1>
<div id="playlists-container"></div>
</div>
<div id="editor-view" class="hidden">
<button id="back-btn">Back</button>
<h2 id="current-playlist-name"></h2>
<div class="section-border">
<h3>Sort</h3>
<div class="controls">
<button id="sort-az">A - Z</button>
<button id="sort-za">Z - A</button>
<button id="sort-artist">Artist</button>
<button id="sort-date">Release Date</button>
<button id="sort-dur-asc">Duration (Short - Long)</button>
<button id="sort-dur-desc">Duration (Long - Short)</button>
<button id="sort-album">Album Grouping</button>
<button id="sort-pop">Popularity (Underground - Mainstream)</button>
</div>
</div>
<div class="section-border">
<h3>Spell</h3>
<div class="flex-row">
<input type="text" id="spell-input" placeholder="Enter word...">
<button id="spell-btn">Apply</button>
</div>
</div>
<div class="section-border">
<h3>Save</h3>
<div class="flex-row">
<button id="save-overwrite">Overwrite Current</button>
<button id="save-new">Save as New</button>
</div>
</div>
<div id="tracks-container"></div>
</div>
<script>
const clientId = 'fcc60831d3974fec8770b2f9af452de8';
const redirectUri = window.location.href.split('#')[0].split('?')[0];
const scopes = 'playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private';
let accessToken = '';
let currentUser = null;
let currentPlaylist = null;
let currentTracks = [];
let draggedItemIndex = null;
const loginView = document.getElementById('login-view');
const playlistsView = document.getElementById('playlists-view');
const editorView = document.getElementById('editor-view');
const loginBtn = document.getElementById('login-btn');
const playlistsContainer = document.getElementById('playlists-container');
const tracksContainer = document.getElementById('tracks-container');
const currentPlaylistName = document.getElementById('current-playlist-name');
const backBtn = document.getElementById('back-btn');
const sortAzBtn = document.getElementById('sort-az');
const sortZaBtn = document.getElementById('sort-za');
const sortArtistBtn = document.getElementById('sort-artist');
const sortDateBtn = document.getElementById('sort-date');
const sortDurAscBtn = document.getElementById('sort-dur-asc');
const sortDurDescBtn = document.getElementById('sort-dur-desc');
const sortAlbumBtn = document.getElementById('sort-album');
const sortPopBtn = document.getElementById('sort-pop');
const spellInput = document.getElementById('spell-input');
const spellBtn = document.getElementById('spell-btn');
const saveOverwriteBtn = document.getElementById('save-overwrite');
const saveNewBtn = document.getElementById('save-new');
function init() {
const hashParams = new URLSearchParams(window.location.hash.substring(1));
if (hashParams.has('access_token')) {
accessToken = hashParams.get('access_token');
window.history.replaceState({}, document.title, window.location.pathname);
loadApp();
} else {
loginView.classList.remove('hidden');
}
}
loginBtn.addEventListener('click', () => {
const authUrl = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(scopes)}`;
window.location.href = authUrl;
});
async function loadApp() {
loginView.classList.add('hidden');
playlistsView.classList.remove('hidden');
const userRes = await fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${accessToken}` } });
currentUser = await userRes.json();
let url = 'https://api.spotify.com/v1/me/playlists?limit=50';
let allPlaylists = [];
while (url) {
const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
const data = await res.json();
allPlaylists = allPlaylists.concat(data.items);
url = data.next;
}
playlistsContainer.innerHTML = '';
allPlaylists.forEach(pl => {
if (!pl) return;
const div = document.createElement('div');
div.className = 'playlist-card';
div.innerHTML = `<span>${pl.name}</span><span>${pl.tracks.total}</span>`;
div.addEventListener('click', () => openPlaylist(pl));
playlistsContainer.appendChild(div);
});
}
async function openPlaylist(pl) {
currentPlaylist = pl;
playlistsView.classList.add('hidden');
editorView.classList.remove('hidden');
currentPlaylistName.textContent = pl.name;
tracksContainer.innerHTML = 'Loading...';
let url = `https://api.spotify.com/v1/playlists/${pl.id}/tracks?limit=100`;
currentTracks = [];
while (url) {
const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
const data = await res.json();
currentTracks = currentTracks.concat(data.items.filter(item => item.track));
url = data.next;
}
renderTracks();
}
backBtn.addEventListener('click', () => {
editorView.classList.add('hidden');
playlistsView.classList.remove('hidden');
currentPlaylist = null;
currentTracks = [];
});
function renderTracks() {
tracksContainer.innerHTML = '';
currentTracks.forEach((item, index) => {
const track = item.track;
const row = document.createElement('div');
row.className = 'track-row';
row.setAttribute('draggable', 'true');
row.dataset.index = index;
const handle = document.createElement('div');
handle.className = 'handle';
handle.textContent = '≡';
const info = document.createElement('div');
info.className = 'track-info';
const name = document.createElement('div');
name.className = 'track-name';
name.textContent = track.name;
const meta = document.createElement('div');
meta.className = 'track-meta';
const artists = track.artists.map(a => a.name).join(', ');
const duration = Math.floor(track.duration_ms / 60000) + ':' + ((track.duration_ms % 60000) / 1000).toFixed(0).padStart(2, '0');
meta.textContent = `${artists} | ${track.album.name} | ${track.album.release_date} | ${duration} | Pop: ${track.popularity}`;
info.appendChild(name);
info.appendChild(meta);
row.appendChild(handle);
row.appendChild(info);
row.addEventListener('dragstart', (e) => {
draggedItemIndex = index;
e.dataTransfer.effectAllowed = 'move';
setTimeout(() => row.classList.add('dragging'), 0);
});
row.addEventListener('dragend', () => {
row.classList.remove('dragging');
draggedItemIndex = null;
});
row.addEventListener('dragover', (e) => {
e.preventDefault();
e.dataTransfer.dropEffect = 'move';
});
row.addEventListener('drop', (e) => {
e.preventDefault();
const targetIndex = index;
if (draggedItemIndex === null || draggedItemIndex === targetIndex) return;
const draggedItem = currentTracks.splice(draggedItemIndex, 1)[0];
currentTracks.splice(targetIndex, 0, draggedItem);
renderTracks();
});
tracksContainer.appendChild(row);
});
}
sortAzBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => a.track.name.localeCompare(b.track.name, undefined, { numeric: true, sensitivity: 'base' }));
renderTracks();
});
sortZaBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => b.track.name.localeCompare(a.track.name, undefined, { numeric: true, sensitivity: 'base' }));
renderTracks();
});
sortArtistBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => {
const artistA = a.track.artists[0]?.name || '';
const artistB = b.track.artists[0]?.name || '';
return artistA.localeCompare(artistB, undefined, { numeric: true, sensitivity: 'base' });
});
renderTracks();
});
sortDateBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => {
const dateA = a.track.album.release_date || '';
const dateB = b.track.album.release_date || '';
return dateA.localeCompare(dateB);
});
renderTracks();
});
sortDurAscBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => a.track.duration_ms - b.track.duration_ms);
renderTracks();
});
sortDurDescBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => b.track.duration_ms - a.track.duration_ms);
renderTracks();
});
sortAlbumBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => {
const albumA = a.track.album.name || '';
const albumB = b.track.album.name || '';
const cmp = albumA.localeCompare(albumB, undefined, { numeric: true, sensitivity: 'base' });
if (cmp !== 0) return cmp;
return a.track.track_number - b.track.track_number;
});
renderTracks();
});
sortPopBtn.addEventListener('click', () => {
currentTracks.sort((a, b) => a.track.popularity - b.track.popularity);
renderTracks();
});
spellBtn.addEventListener('click', () => {
const word = spellInput.value.replace(/[^a-zA-Z0-9]/g, '').toLowerCase().split('');
if (word.length === 0) return;
const spelledTracks = [];
const remainingTracks = [...currentTracks];
word.forEach(char => {
const idx = remainingTracks.findIndex(item => {
const firstChar = item.track.name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase().charAt(0);
return firstChar === char;
});
if (idx !== -1) {
spelledTracks.push(remainingTracks.splice(idx, 1)[0]);
}
});
currentTracks = spelledTracks.concat(remainingTracks);
renderTracks();
spellInput.value = '';
});
async function updatePlaylistTracks(playlistId) {
const uris = currentTracks.map(item => item.track.uri);
await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks`, {
method: 'PUT',
headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
body: JSON.stringify({ uris: uris.slice(0, 100) })
});
for (let i = 100; i < uris.length; i += 100) {
await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks`, {
method: 'POST',
headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
body: JSON.stringify({ uris: uris.slice(i, i + 100) })
});
}
alert('Saved');
}
saveOverwriteBtn.addEventListener('click', () => {
if (!currentPlaylist) return;
saveOverwriteBtn.textContent = 'Saving...';
updatePlaylistTracks(currentPlaylist.id).then(() => {
saveOverwriteBtn.textContent = 'Overwrite Current';
});
});
saveNewBtn.addEventListener('click', () => {
if (!currentPlaylist || !currentUser) return;
saveNewBtn.textContent = 'Saving...';
fetch(`https://api.spotify.com/v1/users/${currentUser.id}/playlists`, {
method: 'POST',
headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
body: JSON.stringify({ name: currentPlaylist.name + ' (Organized)', public: false })
})
.then(res => res.json())
.then(newPl => {
return updatePlaylistTracks(newPl.id);
})
.then(() => {
saveNewBtn.textContent = 'Save as New';
});
});
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify — Your Library</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #121212;
      --elevated: #181818;
      --elevated-hover: #282828;
      --text: #ffffff;
      --subtext: #a7a7a7;
      --accent: #1db954;
      --accent-hover: #1ed760;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .logo { width: 160px; height: 160px; margin-bottom: 24px; }
    .logo svg { width: 100%; height: 100%; }
    .title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--subtext); margin-bottom: 32px; font-size: 1rem; }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 48px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.04); }
    .btn:active { transform: scale(0.98); }

    #main-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      height: 64px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid #282828;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; font-size: 1.25rem; font-weight: 700; }
    .topbar-left svg { width: 32px; height: 32px; fill: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .user-name { color: var(--subtext); font-size: 0.9rem; }
    .logout-btn {
      background: transparent; color: var(--text); border: 1px solid #535353;
      padding: 8px 20px; border-radius: 999px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
    }
    .logout-btn:hover { border-color: var(--text); }

    .content {
      flex: 1;
      position: relative;
      overflow-y: auto;
      background: linear-gradient(180deg, #1e1e1e 0%, var(--surface) 320px);
      padding: 32px;
    }
    .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .section-title { font-size: 1.5rem; font-weight: 700; }
    .live-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: relative; }
    .live-dot::after {
      content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
      border-radius: 50%; border: 2px solid var(--accent); animation: pulse 2s infinite; opacity: 0;
    }
    @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

    .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
    .playlist-card { background: var(--elevated); padding: 16px; border-radius: 8px; cursor: pointer; transition: background 0.25s; }
    .playlist-card:hover { background: var(--elevated-hover); }
    .playlist-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); background: #282828; display: block; }
    .playlist-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .playlist-meta { color: var(--subtext); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-state { color: var(--subtext); padding: 40px 0; }

    .playlist-detail {
      position: absolute; inset: 0; z-index: 20; display: none; flex-direction: column; overflow-y: auto; background: #121212;
    }
    .detail-header { position: relative; padding: 32px; padding-top: 100px; overflow: hidden; }
    .detail-hero-bg {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      filter: blur(80px) brightness(0.15);
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }
    .back-btn {
      position: absolute; top: 24px; left: 32px; z-index: 2; width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.55); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); transform: scale(1.08); }
    .back-btn:active { transform: scale(0.96); }
    .back-btn svg { width: 26px; height: 26px; stroke: #fff; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .detail-hero { position: relative; z-index: 1; display: flex; align-items: flex-end; gap: 24px; }
    .detail-img { width: 232px; height: 232px; object-fit: cover; border-radius: 4px; box-shadow: 0 4px 60px rgba(0,0,0,0.5); flex-shrink: 0; background: #282828; }
    .detail-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .detail-type { text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
    .detail-title { font-size: clamp(2rem, 6vw, 5.5rem); font-weight: 900; line-height: 1; letter-spacing: -0.04em; color: #fff; }
    .detail-sub { font-size: 0.875rem; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .detail-sub img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
    .detail-controls { padding: 16px 32px 24px; display: flex; align-items: center; }
    .detail-play-btn {
      width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; color: #000;
      display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.25rem;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3); transition: transform 0.1s, background 0.2s;
    }
    .detail-play-btn:hover { background: var(--accent-hover); transform: scale(1.06); }

    .detail-list { padding: 0 32px 40px; }
    .track-header {
      display: grid; grid-template-columns: 50px 1fr 1fr 140px 70px; gap: 16px; align-items: center; color: var(--subtext); font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; margin-bottom: 12px; position: sticky; top: 0; background: #121212; z-index: 3;
    }
    .track-row { display: grid; grid-template-columns: 50px 1fr 1fr 140px 70px; gap: 16px; align-items: center; padding: 10px 0; border-radius: 4px; color: var(--subtext); font-size: 0.9rem; }
    .track-row:hover { background: rgba(255,255,255,0.07); }
    .track-num { text-align: center; font-variant-numeric: tabular-nums; color: var(--subtext); }
    .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .track-info img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #282828; }
    .track-name-col { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .track-name-txt { color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist-txt { font-size: 0.8125rem; color: var(--subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-album, .track-date { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-dur { text-align: right; font-variant-numeric: tabular-nums; }
    .tracks-loading, .tracks-empty, .tracks-error { padding: 24px 0; color: var(--subtext); line-height: 1.6; }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="logo">
      <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1DB954" d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
      </svg>
    </div>
    <div class="title">Connect to Spotify</div>
    <div class="subtitle">Sign in to view your playlists.</div>
    <button class="btn" id="connect-btn">Connect Account</button>
  </div>

  <div id="main-screen">
    <div class="topbar">
      <div class="topbar-left">
        <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <path d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
        </svg>
        Spotify
      </div>
      <div class="topbar-right">
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="page-header">
        <div class="section-title">Your Playlists</div>
        <div class="live-dot" id="live-dot"></div>
      </div>
      <div id="playlist-grid" class="playlist-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none;">No playlists found.</div>

      <div class="playlist-detail" id="playlist-detail">
        <div class="detail-header">
          <button class="back-btn" id="back-btn" aria-label="Back">
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <div class="detail-hero-bg" id="detail-hero-bg"></div>
          <div class="detail-hero">
            <img class="detail-img" id="detail-img" src="" alt="">
            <div class="detail-meta">
              <div class="detail-type" id="detail-type">Playlist</div>
              <div class="detail-title" id="detail-title">Title</div>
              <div class="detail-sub" id="detail-sub"></div>
            </div>
          </div>
        </div>

        <div class="detail-controls">
          <button class="detail-play-btn" id="detail-play-btn">▶</button>
        </div>

        <div class="detail-list" id="detail-list">
          <div class="tracks-loading">Loading tracks…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CLIENT_ID = 'fcc60831d3974fec8770b2f9af452de8';
    const REDIRECT_URI = 'https://dccxvii.github.io';
    const AUTH_URL = 'https://accounts.spotify.com/authorize';
    const TOKEN_URL = 'https://accounts.spotify.com/api/token';
    const API = 'https://api.spotify.com/v1';

    const loginScreen = document.getElementById('login-screen');
    const mainScreen = document.getElementById('main-screen');
    const playlistGrid = document.getElementById('playlist-grid');
    const emptyState = document.getElementById('empty-state');
    const userNameEl = document.getElementById('user-name');
    const liveDot = document.getElementById('live-dot');
    const content = document.getElementById('content');

    const playlistDetail = document.getElementById('playlist-detail');
    const detailHeroBg = document.getElementById('detail-hero-bg');
    const detailImg = document.getElementById('detail-img');
    const detailType = document.getElementById('detail-type');
    const detailTitle = document.getElementById('detail-title');
    const detailSub = document.getElementById('detail-sub');
    const detailList = document.getElementById('detail-list');
    const backBtn = document.getElementById('back-btn');

    let currentToken = null;
    let currentUserId = null;
    let currentUserName = '';
    let currentUserImage = null;
    let gridPollInterval = null;
    let detailPollInterval = null;
    let currentDetailPl = null;

    function showLogin() { loginScreen.style.display = 'flex'; mainScreen.style.display = 'none'; liveDot.style.display = 'none'; }
    function showMain() { loginScreen.style.display = 'none'; mainScreen.style.display = 'flex'; liveDot.style.display = 'block'; }

    function startGridPolling() { stopGridPolling(); if (!currentToken || playlistDetail.style.display === 'flex') return; gridPollInterval = setInterval(() => loadPlaylists(currentToken, currentUserId, true), 3000); }
    function stopGridPolling() { if (gridPollInterval) { clearInterval(gridPollInterval); gridPollInterval = null; } }

    function startDetailPolling(pl) { stopDetailPolling(); if (!currentToken || !pl) return; currentDetailPl = pl; detailPollInterval = setInterval(() => loadAndRenderPlaylistTracks(pl, true), 3000); }
    function stopDetailPolling() { if (detailPollInterval) { clearInterval(detailPollInterval); detailPollInterval = null; } currentDetailPl = null; }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentToken) {
        if (playlistDetail.style.display === 'flex' && currentDetailPl) {
          loadAndRenderPlaylistTracks(currentDetailPl, true);
          startDetailPolling(currentDetailPl);
        } else {
          loadPlaylists(currentToken, currentUserId, true);
          startGridPolling();
        }
      } else {
        stopGridPolling();
        stopDetailPolling();
      }
    });

    function genRandom(length) { const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'; let t = ''; for (let i = 0; i < length; i++) t += c.charAt(Math.floor(Math.random() * c.length)); return t; }
    async function sha256(plain) { return window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain)); }
    function b64url(a) { let s = ''; const b = new Uint8Array(a); for (let i = 0; i < b.byteLength; i++) s += String.fromCharCode(b[i]); return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); }
    async function challenge(v) { return b64url(await sha256(v)); }

    document.getElementById('connect-btn').addEventListener('click', async () => {
      const verifier = genRandom(128);
      localStorage.setItem('spotify_code_verifier', verifier);
      const ch = await challenge(verifier);
      const p = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI, code_challenge_method: 'S256', code_challenge: ch, show_dialog: 'true', scope: 'user-read-private playlist-read-private playlist-read-collaborative' });
      window.location.href = `${AUTH_URL}?${p.toString()}`;
    });

    window.addEventListener('DOMContentLoaded', async () => {
      const up = new URLSearchParams(window.location.search);
      const code = up.get('code');
      const error = up.get('error');
      if (error) { showLogin(); return; }
      const stored = localStorage.getItem('spotify_access_token');

      if (code && !stored) {
        const verifier = localStorage.getItem('spotify_code_verifier');
        if (!verifier) { showLogin(); return; }
        try {
          const res = await fetch(TOKEN_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code: code, redirect_uri: REDIRECT_URI, code_verifier: verifier }) });
          if (!res.ok) throw new Error('token exchange failed');
          const data = await res.json();
          const token = data.access_token;
          localStorage.setItem('spotify_access_token', token);
          if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
          localStorage.removeItem('spotify_code_verifier');
          window.history.replaceState({}, document.title, REDIRECT_URI);
          currentToken = token;
          showMain();
          await initDashboard(token);
        } catch (e) { console.error(e); localStorage.removeItem('spotify_code_verifier'); showLogin(); }
      } else if (stored) { currentToken = stored; showMain(); await initDashboard(stored); }
      else { showLogin(); }
    });

    async function initDashboard(token) { const userId = await loadUser(token); await loadPlaylists(token, userId, false); startGridPolling(); }
    async function loadUser(token) {
      try {
        const res = await fetch(`${API}/me`, { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) throw new Error('User fetch failed: ' + res.status);
        const data = await res.json();
        currentUserId = data.id || null;
        currentUserName = data.display_name || data.id || 'Listener';
        currentUserImage = (data.images && data.images.length) ? data.images[0].url : null;
        userNameEl.textContent = currentUserName;
        return currentUserId;
      } catch (e) { console.error(e); userNameEl.textContent = 'Listener'; currentUserId = null; return null; }
    }

    async function loadPlaylists(token, userId, silent = false) {
      if (!token) return;
      try {
        let items = [];
        let url = `${API}/me/playlists?limit=50`;
        while (url && items.length < 200) {
          const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
          if (res.status === 401) { handleLogout(); return; }
          if (!res.ok) { console.warn('Playlist page fetch status', res.status); break; }
          const data = await res.json();
          const pageItems = Array.isArray(data.items) ? data.items : [];
          items.push(...pageItems);
          url = (typeof data.next === 'string') ? data.next : null;
        }
        let owned = items;
        if (typeof userId === 'string') owned = items.filter(pl => pl && pl.owner && pl.owner.id === userId);
        renderGrid(owned);
      } catch (e) { console.error('playlist load error', e); if (!silent) playlistGrid.innerHTML = '<div class="empty-state">Unable to load playlists.</div>'; }
    }

    function renderGrid(items) {
      playlistGrid.innerHTML = '';
      if (!Array.isArray(items) || items.length === 0) { emptyState.style.display = 'block'; return; }
      emptyState.style.display = 'none';
      items.forEach(pl => {
        if (!pl || !pl.id) return;
        const card = document.createElement('div');
        card.className = 'playlist-card';
        const imgUrl = (pl.images && pl.images.length && pl.images[0].url) ? pl.images[0].url : 'https://via.placeholder.com/300x300/181818/b3b3b3?text=Playlist';
        const trackCount = (pl.tracks && typeof pl.tracks.total === 'number') ? `${pl.tracks.total} tracks` : 'Playlist';
        card.innerHTML = `
          <img class="playlist-img" src="${imgUrl}" alt="${pl.name || 'Playlist'}" loading="lazy">
          <div class="playlist-name">${pl.name || 'Untitled'}</div>
          <div class="playlist-meta">${trackCount}</div>
        `;
        card.addEventListener('click', () => openPlaylist(pl));
        playlistGrid.appendChild(card);
      });
    }

    async function openPlaylist(pl) {
      if (!pl || !pl.id) return;
      stopGridPolling();
      playlistDetail.style.display = 'flex';
      content.scrollTop = 0; playlistDetail.scrollTop = 0;

      const imgUrl = (pl.images && pl.images.length && pl.images[0].url) ? pl.images[0].url : 'https://via.placeholder.com/300x300/181818/b3b3b3?text=Playlist';
      detailImg.src = imgUrl;
      detailHeroBg.style.backgroundImage = `url('${imgUrl}')`;
      detailTitle.textContent = pl.name || 'Untitled';
      detailType.textContent = (pl.public === false) ? 'Private Playlist' : 'Public Playlist';

      const ownerImg = currentUserImage ? `<img src="${currentUserImage}" alt="">` : '';
      detailSub.innerHTML = ownerImg + `<span>${currentUserName}</span>`;
      detailList.innerHTML = '<div class="tracks-loading">Loading tracks…</div>';

      await loadAndRenderPlaylistTracks(pl);
      startDetailPolling(pl);
    }

    async function loadAndRenderPlaylistTracks(pl, silent = false) {
      let tracks = [];
      let url = `${API}/playlists/${pl.id}/tracks?limit=100`;
      let fetchErr = null;
      try {
        while (url && tracks.length < 10000) {
          const res = await fetch(url, { headers: { Authorization: 'Bearer ' + currentToken } });
          if (res.status === 401) { handleLogout(); return; }
          if (res.status === 403) { fetchErr = 403; break; }
          if (!res.ok) { fetchErr = res.status; break; }
          const data = await res.json();
          tracks.push(...(Array.isArray(data.items) ? data.items : []));
          url = (typeof data.next === 'string') ? data.next : null;
        }
      } catch (e) { console.error(e); fetchErr = 'network'; }
      renderTracks(tracks, pl, fetchErr, silent);
    }

    function renderTracks(items, plContext, fetchErr, silent) {
      let totalMs = 0;
      const validItems = items.filter(it => it && it.track);
      const rows = validItems.map((item, idx) => {
        const t = item.track;
        totalMs += (t.duration_ms || 0);
        const art = (t.album && t.album.images && t.album.images.length) ? (t.album.images[2] || t.album.images[1] || t.album.images[0]).url : 'https://via.placeholder.com/40/181818/b3b3b3?text=♪';
        const name = t.name || 'Unknown';
        const artist = t.artists ? t.artists.map(a => a.name).join(', ') : 'Unknown Artist';
        const album = (t.album && t.album.name) ? t.album.name : '';
        const added = item.added_at ? relativeDate(item.added_at) : '';
        const dur = formatTime(t.duration_ms || 0);
        return `
          <div class="track-row">
            <div class="track-num">${idx + 1}</div>
            <div class="track-info">
              <img src="${art}" alt="">
              <div class="track-name-col">
                <div class="track-name-txt">${name}</div>
                <div class="track-artist-txt">${artist}</div>
              </div>
            </div>
            <div class="track-album">${album}</div>
            <div class="track-date">${added}</div>
            <div class="track-dur">${dur}</div>
          </div>`;
      }).join('');

      const header = `
        <div class="track-header">
          <span>#</span><span>Title</span><span>Album</span><span>Date added</span>
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></span>
        </div>`;

      let body = rows;
      if (body === '' && fetchErr === 403) {
        body = `<div class="tracks-error">Access denied (403). Your current login token is missing the <b>playlist-read-private</b> permission.<br>Click <b>Log out</b> in the top-right, then reconnect to grant access.</div>`;
      } else if (body === '' && fetchErr) {
        body = `<div class="tracks-error">Trouble loading tracks (error ${fetchErr}). Showing 0 loaded.</div>`;
      } else if (body === '') {
        body = `<div class="tracks-empty">This playlist is empty.</div>`;
      }

      // Only replace DOM if not in silent mode? No, we need to update live.
      detailList.innerHTML = header + body;

      const count = validItems.length;
      const durText = formatTotalDuration(totalMs);
      const ownerImg = currentUserImage ? `<img src="${currentUserImage}" alt="">` : '';
      detailSub.innerHTML = `${ownerImg}<span>${currentUserName}</span> &nbsp;•&nbsp; ${count} song${count !== 1 ? 's' : ''}, ${durText}`;
    }

    backBtn.addEventListener('click', () => { stopDetailPolling(); playlistDetail.style.display = 'none'; startGridPolling(); });

    function formatTime(ms) { const s = Math.floor(ms / 1000); const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
    function formatTotalDuration(ms) {
      const totalSec = Math.floor(ms / 1000); const h = Math.floor(totalSec / 3600); const m = Math.floor((totalSec % 3600) / 60); const s = totalSec % 60;
      if (h > 0) return `${h} hr ${m} min`; if (m > 0) return `${m} min ${s} sec`; return `${s} sec`;
    }
    function relativeDate(isoString) {
      const date = new Date(isoString); const now = new Date(); const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return `${diff} seconds ago`; if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`; if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`; if (diff < 604800) return `${Math.floor(diff / 86400)} days ago`;
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    document.getElementById('logout-btn').addEventListener('click', handleLogout);
    function handleLogout() {
      stopGridPolling(); stopDetailPolling();
      currentToken = null; currentUserId = null; currentDetailPl = null;
      localStorage.removeItem('spotify_access_token'); localStorage.removeItem('spotify_refresh_token'); localStorage.removeItem('spotify_code_verifier');
      playlistGrid.innerHTML = ''; userNameEl.textContent = ''; playlistDetail.style.display = 'none'; showLogin();
    }
  </script>
</body>
</html>

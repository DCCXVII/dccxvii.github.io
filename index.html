<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify — Your Library</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #121212;
      --elevated: #181818;
      --elevated-hover: #282828;
      --text: #ffffff;
      --subtext: #a7a7a7;
      --accent: #1db954;
      --accent-hover: #1ed760;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* ---------- LOGIN SCREEN ---------- */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 160px;
      height: 160px;
      margin-bottom: 24px;
    }
    .logo svg { width: 100%; height: 100%; }
    .title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--subtext); margin-bottom: 32px; font-size: 1rem; }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 48px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.04); }
    .btn:active { transform: scale(0.98); }

    /* ---------- MAIN SCREEN ---------- */
    #main-screen {
      display: none;
      height: 100vh;
      overflow: hidden;
      flex-direction: column;
    }
    .topbar {
      height: 64px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid #282828;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .topbar-left svg { width: 32px; height: 32px; fill: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .user-name { color: var(--subtext); font-size: 0.9rem; }
    .logout-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid #535353;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .logout-btn:hover { border-color: var(--text); }

    .content {
      flex: 1;
      overflow-y: auto;
      background: linear-gradient(180deg, #1e1e1e 0%, var(--surface) 320px);
      padding: 32px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .section-title { font-size: 1.5rem; font-weight: 700; }
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      position: relative;
    }
    .live-dot::after {
      content: '';
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: pulse 2s infinite;
      opacity: 0;
    }
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2); opacity: 0; }
    }

    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 24px;
    }
    .playlist-card {
      background: var(--elevated);
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .playlist-card:hover { background: var(--elevated-hover); }
    .playlist-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      background: #282828;
      display: block;
    }
    .playlist-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .playlist-meta {
      color: var(--subtext);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state { color: var(--subtext); padding: 40px 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="logo">
      <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1DB954" d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
      </svg>
    </div>
    <div class="title">Connect to Spotify</div>
    <div class="subtitle">Sign in to view your library.</div>
    <button class="btn" id="connect-btn">Connect Account</button>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <div class="topbar">
      <div class="topbar-left">
        <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <path d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
        </svg>
        Spotify
      </div>
      <div class="topbar-right">
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="section-title">Your Playlists</div>
        <div class="live-dot" id="live-dot"></div>
      </div>
      <div id="playlist-grid" class="playlist-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none;">No playlists found.</div>
    </div>
  </div>

  <script>
    const CLIENT_ID = 'fcc60831d3974fec8770b2f9af452de8';
    const REDIRECT_URI = 'https://dccxvii.github.io';
    const AUTH_URL = 'https://accounts.spotify.com/authorize';
    const TOKEN_URL = 'https://accounts.spotify.com/api/token';
    const API = 'https://api.spotify.com/v1';

    // The "Liked Songs" image (gradient + heart)
    const LIKED_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='300' y2='300'%3E%3Cstop offset='0%25' stop-color='%234509af'/%3E%3Cstop offset='100%25' stop-color='%238b7ec8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='300' height='300' fill='url(%23g)'/%3E%3Cpath d='M150 225c-40-30-75-58-75-95 0-25 20-45 45-45 20 0 30 12 30 12s10-12 30-12c25 0 45 20 45 45 0 37-35 65-75 95z' fill='%23fff'/%3E%3C/svg%3E";

    // DOM
    const loginScreen = document.getElementById('login-screen');
    const mainScreen = document.getElementById('main-screen');
    const playlistGrid = document.getElementById('playlist-grid');
    const emptyState = document.getElementById('empty-state');
    const userNameEl = document.getElementById('user-name');
    const liveDot = document.getElementById('live-dot');

    let currentToken = null;
    let pollInterval = null;

    function showLogin() {
      loginScreen.style.display = 'flex';
      mainScreen.style.display = 'none';
      liveDot.style.display = 'none';
    }
    function showMain() {
      loginScreen.style.display = 'none';
      mainScreen.style.display = 'flex';
      liveDot.style.display = 'block';
    }

    function startPolling() {
      stopPolling();
      if (!currentToken) return;
      pollInterval = setInterval(() => loadPlaylists(currentToken, true), 3000);
    }
    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentToken) {
        loadPlaylists(currentToken, true);
        startPolling();
      } else {
        stopPolling();
      }
    });

    // PKCE helpers
    function genRandom(length) {
      const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      let t = '';
      for (let i = 0; i < length; i++) t += c.charAt(Math.floor(Math.random() * c.length));
      return t;
    }
    async function sha256(plain) {
      return window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
    }
    function b64url(a) {
      let s = '';
      const b = new Uint8Array(a);
      for (let i = 0; i < b.byteLength; i++) s += String.fromCharCode(b[i]);
      return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    async function challenge(v) { return b64url(await sha256(v)); }

    // Auth: connect
    document.getElementById('connect-btn').addEventListener('click', async () => {
      const verifier = genRandom(128);
      localStorage.setItem('spotify_code_verifier', verifier);
      const ch = await challenge(verifier);
      const p = new URLSearchParams({
        client_id: CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: ch,
        show_dialog: 'true',
        scope: 'user-read-private playlist-read-private playlist-read-collaborative user-library-read'
      });
      window.location.href = `${AUTH_URL}?${p.toString()}`;
    });

    // Boot
    window.addEventListener('DOMContentLoaded', async () => {
      const up = new URLSearchParams(window.location.search);
      const code = up.get('code');
      const error = up.get('error');

      if (error) {
        showLogin();
        return;
      }

      const stored = localStorage.getItem('spotify_access_token');

      if (code && !stored) {
        const verifier = localStorage.getItem('spotify_code_verifier');
        if (!verifier) { showLogin(); return; }
        try {
          const res = await fetch(TOKEN_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: CLIENT_ID,
              grant_type: 'authorization_code',
              code: code,
              redirect_uri: REDIRECT_URI,
              code_verifier: verifier
            })
          });
          if (!res.ok) throw new Error('token exchange failed');
          const data = await res.json();
          const token = data.access_token;
          localStorage.setItem('spotify_access_token', token);
          if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
          localStorage.removeItem('spotify_code_verifier');
          window.history.replaceState({}, document.title, REDIRECT_URI);
          currentToken = token;
          showMain();
          await initDashboard(token);
        } catch (e) {
          console.error(e);
          localStorage.removeItem('spotify_code_verifier');
          showLogin();
        }
      } else if (stored) {
        currentToken = stored;
        showMain();
        await initDashboard(stored);
      } else {
        showLogin();
      }
    });

    async function initDashboard(token) {
      await loadUser(token);
      await loadPlaylists(token);
      startPolling();
    }

    async function loadUser(token) {
      try {
        const res = await fetch(`${API}/me`, { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) return;
        const data = await res.json();
        userNameEl.textContent = data.display_name || data.id;
      } catch { userNameEl.textContent = 'Listener'; }
    }

    // Fetch up to 200 playlists (across pages) and inject Liked Songs
    async function loadPlaylists(token, silent = false) {
      if (!token) return;

      try {
        // Paginated playlist fetch
        let items = [];
        let url = `${API}/me/playlists?limit=50`;
        while (url && items.length < 200) {
          const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
          if (res.status === 401) { handleLogout(); return; }
          if (!res.ok) throw new Error('playlists fetch failed');
          const data = await res.json();
          items.push(...(data.items || []));
          url = data.next;
        }

        // Fetch liked-songs count
        let likedCount = 0;
        try {
          const likedRes = await fetch(`${API}/me/tracks?limit=1`, { headers: { Authorization: 'Bearer ' + token } });
          if (likedRes.status === 401) { handleLogout(); return; }
          if (likedRes.ok) {
            const likedData = await likedRes.json();
            likedCount = likedData.total || 0;
          }
        } catch (e) { console.log('liked count skipped', e); }

        // Build virtual Liked Songs entry
        const ownerName = userNameEl.textContent || 'You';
        const likedSongs = {
          id: 'liked-songs',
          name: 'Liked Songs',
          images: [{ url: LIKED_IMG }],
          owner: { display_name: ownerName, id: 'spotify' },
          tracks: { total: likedCount }
        };
        items.unshift(likedSongs);

        render(items);
      } catch (e) {
        console.error('Load error', e);
        // Don't wipe the grid on silent background poll failures
        if (!silent) {
          playlistGrid.innerHTML = '<div class="empty-state">Unable to reach Spotify. Please wait or log out and back in.</div>';
        }
      }
    }

    function render(items) {
      playlistGrid.innerHTML = '';
      if (!items.length) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      items.forEach(pl => {
        const card = document.createElement('div');
        card.className = 'playlist-card';
        const imgUrl = (pl.images && pl.images.length) ? pl.images[0].url : 'https://via.placeholder.com/300x300/181818/b3b3b3?text=Playlist';
        const owner = pl.owner.display_name || pl.owner.id;
        const count = pl.tracks && pl.tracks.total != null ? `${pl.tracks.total} tracks` : '';
        card.innerHTML = `
          <img class="playlist-img" src="${imgUrl}" alt="${pl.name}" loading="lazy">
          <div class="playlist-name" title="${pl.name}">${pl.name}</div>
          <div class="playlist-meta">${owner}${count ? ' • ' + count : ''}</div>
        `;
        playlistGrid.appendChild(card);
      });
    }

    // Logout: clear everything and force a fresh approval next time
    document.getElementById('logout-btn').addEventListener('click', handleLogout);

    function handleLogout() {
      stopPolling();
      currentToken = null;
      localStorage.removeItem('spotify_access_token');
      localStorage.removeItem('spotify_refresh_token');
      localStorage.removeItem('spotify_code_verifier');
      playlistGrid.innerHTML = '';
      userNameEl.textContent = '';
      showLogin();
    }
  </script>
</body>
</html>

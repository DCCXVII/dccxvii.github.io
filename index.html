<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Organizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  min-height: 100vh;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px 100px;
}
h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
  margin-bottom: 30px;
  border-bottom: 1px solid #fff;
  padding-bottom: 16px;
}
.screen { display: none; }
.screen.active { display: block; }
.center-box {
  text-align: center;
  margin-top: 100px;
}
button {
  background: #000;
  color: #fff;
  border: 1px solid #fff;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
  border-radius: 0;
  font-family: inherit;
}
button:hover { background: #fff; color: #000; }
button:disabled {
  opacity: 0.3;
  cursor: default;
}
button:disabled:hover { background: #000; color: #fff; }
.btn-primary {
  background: #fff;
  color: #000;
}
.btn-primary:hover { background: #ccc; }
.playlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  margin-top: 20px;
}
.playlist-card {
  border: 1px solid #fff;
  cursor: pointer;
  padding: 10px;
  text-align: left;
}
.playlist-card:hover { background: #1a1a1a; }
.playlist-card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  display: block;
  margin-bottom: 8px;
  background: #222;
}
.playlist-card .name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.playlist-card .count {
  font-size: 11px;
  color: #aaa;
  margin-top: 2px;
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
}
.toolbar select {
  background: #000;
  color: #fff;
  border: 1px solid #fff;
  padding: 9px 10px;
  font-size: 13px;
  font-family: inherit;
}
.toolbar .spacer { flex: 1; }
.back-link {
  font-size: 13px;
  color: #aaa;
  cursor: pointer;
  text-decoration: underline;
  margin-bottom: 16px;
  display: inline-block;
}
.playlist-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.playlist-header img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  background: #222;
}
.playlist-header .title {
  font-size: 18px;
  font-weight: 700;
}
.playlist-header .sub {
  font-size: 12px;
  color: #aaa;
}
.track-list {
  border: 1px solid #fff;
}
.track-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border-bottom: 1px solid #333;
  background: #000;
}
.track-row:last-child { border-bottom: none; }
.track-row.dragging { opacity: 0.3; }
.track-row.drag-over { border-top: 2px solid #fff; }
.handle {
  cursor: grab;
  font-size: 16px;
  color: #888;
  user-select: none;
  padding: 0 4px;
}
.handle:active { cursor: grabbing; }
.track-num {
  width: 28px;
  font-size: 12px;
  color: #888;
  text-align: right;
}
.track-art {
  width: 40px;
  height: 40px;
  object-fit: cover;
  background: #222;
  flex-shrink: 0;
}
.track-info {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}
.track-title {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-meta {
  font-size: 11px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-dur {
  font-size: 12px;
  color: #aaa;
  width: 44px;
  text-align: right;
  flex-shrink: 0;
}
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  border-top: 1px solid #fff;
  padding: 14px 20px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.modal-box {
  background: #000;
  border: 1px solid #fff;
  padding: 24px;
  width: 90%;
  max-width: 420px;
}
.modal-box h3 {
  font-size: 16px;
  margin-bottom: 14px;
}
.modal-box input[type="text"] {
  width: 100%;
  background: #000;
  border: 1px solid #fff;
  color: #fff;
  padding: 10px;
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 14px;
}
.modal-box .modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.modal-box p.hint {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 14px;
  line-height: 1.5;
}
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #000;
  padding: 12px 22px;
  font-size: 13px;
  font-weight: 600;
  z-index: 100;
  border: 1px solid #000;
}
.loading {
  text-align: center;
  margin-top: 100px;
  font-size: 14px;
  color: #aaa;
}
.spell-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
}
.spell-row input {
  flex: 1;
  background: #000;
  border: 1px solid #fff;
  color: #fff;
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  text-transform: uppercase;
}
::placeholder { color: #777; }
a { color: #fff; }
.footer-note {
  text-align: center;
  font-size: 11px;
  color: #666;
  margin-top: 30px;
}
</style>
</head>
<body>

<div class="container">
  <h1>PLAYLIST ORGANIZER</h1>

  <div id="screen-login" class="screen active">
    <div class="center-box">
      <button class="btn-primary" id="login-btn">Connect Account</button>
    </div>
  </div>

  <div id="screen-loading" class="screen">
    <div class="loading">Loading...</div>
  </div>

  <div id="screen-playlists" class="screen">
    <div id="playlist-grid" class="playlist-grid"></div>
  </div>

  <div id="screen-editor" class="screen">
    <span class="back-link" id="back-to-playlists">&larr; back to playlists</span>
    <div class="playlist-header" id="editor-header"></div>

    <div class="toolbar">
      <select id="sort-select">
        <option value="">Sort by...</option>
        <option value="alpha-az">Title A &rarr; Z</option>
        <option value="alpha-za">Title Z &rarr; A</option>
        <option value="artist-az">Artist A &rarr; Z</option>
        <option value="artist-za">Artist Z &rarr; A</option>
        <option value="date-old">Release Date: Oldest first</option>
        <option value="date-new">Release Date: Newest first</option>
        <option value="dur-asc">Duration: Shortest first</option>
        <option value="dur-desc">Duration: Longest first</option>
        <option value="album">Group by Album</option>
      </select>
      <button id="apply-sort-btn">Apply</button>
      <div class="spacer"></div>
      <button id="spell-btn">Spell Something</button>
      <button id="reset-btn">Reset Order</button>
    </div>

    <div class="track-list" id="track-list"></div>
  </div>

  <div class="action-bar" id="action-bar" style="display:none;">
    <button id="save-overwrite-btn">Overwrite Playlist</button>
    <button class="btn-primary" id="save-new-btn">Save as New Playlist</button>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
const CLIENT_ID = "fcc60831d3974fec8770b2f9af452de8";
const REDIRECT_URI = "https://dccxvii.github.io";
const SCOPES = "playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private user-library-read";

let accessToken = null;
let currentPlaylist = null;
let currentTracks = [];
let originalTracks = [];
let userId = null;

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showToast(msg) {
  const root = document.getElementById("toast-root");
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function base64UrlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return base64UrlEncode(digest);
}

function generateRandomString(length) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let result = "";
  const values = crypto.getRandomValues(new Uint8Array(length));
  for (let i = 0; i < length; i++) result += chars[values[i] % chars.length];
  return result;
}

async function startLogin() {
  const verifier = generateRandomString(64);
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem("pkce_verifier", verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge
  });
  window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
}

async function exchangeCodeForToken(code) {
  const verifier = sessionStorage.getItem("pkce_verifier");
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "authorization_code",
    code: code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body
  });
  if (!res.ok) throw new Error("Token exchange failed");
  const data = await res.json();
  accessToken = data.access_token;
  localStorage.setItem("spotify_access_token", data.access_token);
  localStorage.setItem("spotify_refresh_token", data.refresh_token || "");
  localStorage.setItem("spotify_token_expiry", Date.now() + data.expires_in * 1000);
}

async function refreshAccessToken() {
  const refreshToken = localStorage.getItem("spotify_refresh_token");
  if (!refreshToken) return false;
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "refresh_token",
    refresh_token: refreshToken
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body
  });
  if (!res.ok) return false;
  const data = await res.json();
  accessToken = data.access_token;
  localStorage.setItem("spotify_access_token", data.access_token);
  if (data.refresh_token) localStorage.setItem("spotify_refresh_token", data.refresh_token);
  localStorage.setItem("spotify_token_expiry", Date.now() + data.expires_in * 1000);
  return true;
}

async function apiFetch(url, options = {}) {
  options.headers = options.headers || {};
  options.headers["Authorization"] = "Bearer " + accessToken;
  let res = await fetch(url, options);
  if (res.status === 401) {
    const refreshed = await refreshAccessToken();
    if (refreshed) {
      options.headers["Authorization"] = "Bearer " + accessToken;
      res = await fetch(url, options);
    }
  }
  return res;
}

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");

  if (code) {
    showScreen("screen-loading");
    try {
      await exchangeCodeForToken(code);
      window.history.replaceState({}, document.title, window.location.pathname);
      await loadUserAndPlaylists();
    } catch (e) {
      showToast("Login failed. Try again.");
      showScreen("screen-login");
    }
    return;
  }

  const storedToken = localStorage.getItem("spotify_access_token");
  const expiry = parseInt(localStorage.getItem("spotify_token_expiry") || "0");
  if (storedToken) {
    accessToken = storedToken;
    showScreen("screen-loading");
    if (Date.now() > expiry) {
      const ok = await refreshAccessToken();
      if (!ok) {
        showScreen("screen-login");
        return;
      }
    }
    try {
      await loadUserAndPlaylists();
    } catch (e) {
      showScreen("screen-login");
    }
  }
}

async function loadUserAndPlaylists() {
  showScreen("screen-loading");
  const meRes = await apiFetch("https://api.spotify.com/v1/me");
  if (!meRes.ok) throw new Error("auth failed");
  const me = await meRes.json();
  userId = me.id;
  await loadPlaylists();
}

async function loadPlaylists() {
  let playlists = [];
  let url = "https://api.spotify.com/v1/me/playlists?limit=50";
  while (url) {
    const res = await apiFetch(url);
    const data = await res.json();
    playlists = playlists.concat(data.items);
    url = data.next;
  }
  renderPlaylists(playlists);
  showScreen("screen-playlists");
}

function renderPlaylists(playlists) {
  const grid = document.getElementById("playlist-grid");
  grid.innerHTML = "";
  playlists.forEach(p => {
    const card = document.createElement("div");
    card.className = "playlist-card";
    const img = (p.images && p.images.length) ? p.images[0].url : "";
    card.innerHTML = `
      <img src="${img}" onerror="this.style.display='none'">
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="count">${p.tracks.total} tracks</div>
    `;
    card.addEventListener("click", () => openPlaylist(p));
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

async function openPlaylist(playlist) {
  showScreen("screen-loading");
  currentPlaylist = playlist;
  let tracks = [];
  let url = `https://api.spotify.com/v1/playlists/${playlist.id}/tracks?limit=100&fields=items(track(id,uri,name,artists(name),album(name,release_date,images)),is_local),next`;
  while (url) {
    const res = await apiFetch(url);
    const data = await res.json();
    data.items.forEach(item => {
      if (item.track && item.track.id) {
        tracks.push({
          uri: item.track.uri,
          name: item.track.name,
          artists: item.track.artists.map(a => a.name).join(", "),
          artistFirst: item.track.artists[0] ? item.track.artists[0].name : "",
          album: item.track.album.name,
          releaseDate: item.track.album.release_date || "0000-00-00",
          duration_ms: item.track.duration_ms || 0,
          image: (item.track.album.images && item.track.album.images.length) ? item.track.album.images[item.track.album.images.length - 1].url : ""
        });
      }
    });
    url = data.next;
  }
  currentTracks = tracks.slice();
  originalTracks = tracks.slice();
  renderEditor();
  showScreen("screen-editor");
  document.getElementById("action-bar").style.display = "flex";
}

function renderEditor() {
  const header = document.getElementById("editor-header");
  const img = (currentPlaylist.images && currentPlaylist.images.length) ? currentPlaylist.images[0].url : "";
  header.innerHTML = `
    <img src="${img}" onerror="this.style.display='none'">
    <div>
      <div class="title">${escapeHtml(currentPlaylist.name)}</div>
      <div class="sub">${currentTracks.length} tracks</div>
    </div>
  `;
  renderTrackList();
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min + ":" + (sec < 10 ? "0" : "") + sec;
}

let dragSrcIndex = null;

function renderTrackList() {
  const list = document.getElementById("track-list");
  list.innerHTML = "";
  currentTracks.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "track-row";
    row.draggable = true;
    row.dataset.index = i;
    row.innerHTML = `
      <span class="handle">&#9776;</span>
      <span class="track-num">${i + 1}</span>
      <img class="track-art" src="${t.image}" onerror="this.style.display='none'">
      <div class="track-info">
        <div class="track-title">${escapeHtml(t.name)}</div>
        <div class="track-meta">${escapeHtml(t.artists)} &middot; ${escapeHtml(t.album)}</div>
      </div>
      <div class="track-dur">${formatDuration(t.duration_ms)}</div>
    `;

    row.addEventListener("dragstart", (e) => {
      dragSrcIndex = i;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      document.querySelectorAll(".track-row").forEach(r => r.classList.remove("drag-over"));
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      row.classList.add("drag-over");
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("drag-over");
    });
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      row.classList.remove("drag-over");
      const targetIndex = parseInt(row.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      const moved = currentTracks.splice(dragSrcIndex, 1)[0];
      currentTracks.splice(targetIndex, 0, moved);
      dragSrcIndex = null;
      renderTrackList();
    });

    list.appendChild(row);
  });
}

function naturalCompare(a, b) {
  const isDigitA = /^[0-9]/.test(a);
  const isDigitB = /^[0-9]/.test(b);
  if (isDigitA && !isDigitB) return -1;
  if (!isDigitA && isDigitB) return 1;
  return a.localeCompare(b, undefined, { sensitivity: "base", numeric: true });
}

function applySort() {
  const mode = document.getElementById("sort-select").value;
  if (!mode) return;

  if (mode === "alpha-az") {
    currentTracks.sort((a, b) => naturalCompare(a.name, b.name));
  } else if (mode === "alpha-za") {
    currentTracks.sort((a, b) => naturalCompare(b.name, a.name));
  } else if (mode === "artist-az") {
    currentTracks.sort((a, b) => naturalCompare(a.artistFirst, b.artistFirst));
  } else if (mode === "artist-za") {
    currentTracks.sort((a, b) => naturalCompare(b.artistFirst, a.artistFirst));
  } else if (mode === "date-old") {
    currentTracks.sort((a, b) => a.releaseDate.localeCompare(b.releaseDate));
  } else if (mode === "date-new") {
    currentTracks.sort((a, b) => b.releaseDate.localeCompare(a.releaseDate));
  } else if (mode === "dur-asc") {
    currentTracks.sort((a, b) => a.duration_ms - b.duration_ms);
  } else if (mode === "dur-desc") {
    currentTracks.sort((a, b) => b.duration_ms - a.duration_ms);
  } else if (mode === "album") {
    const albumOrder = [];
    const seen = {};
    currentTracks.forEach(t => {
      if (!seen[t.album]) {
        seen[t.album] = true;
        albumOrder.push(t.album);
      }
    });
    const albumIndex = {};
    albumOrder.forEach((a, i) => albumIndex[a] = i);
    currentTracks.sort((a, b) => {
      if (albumIndex[a.album] !== albumIndex[b.album]) {
        return albumIndex[a.album] - albumIndex[b.album];
      }
      return a.releaseDate.localeCompare(b.releaseDate);
    });
  }

  renderTrackList();
}

function resetOrder() {
  currentTracks = originalTracks.slice();
  renderTrackList();
  document.getElementById("sort-select").value = "";
  showToast("Order reset");
}

function openModal(html) {
  const root = document.getElementById("modal-root");
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal-box">${html}</div></div>`;
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target.id === "modal-overlay") closeModal();
  });
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

function openSpellModal() {
  openModal(`
    <h3>Spell Something</h3>
    <p class="hint">Type the word or phrase you want spelled out using the first letters of specific tracks. Matching tracks move to the front in order; the rest of the playlist stays untouched. Spaces are skipped.</p>
    <div class="spell-row">
      <input type="text" id="spell-input" placeholder="e.g. HELLO" maxlength="40">
    </div>
    <div class="modal-actions">
      <button id="spell-cancel-btn">Cancel</button>
      <button class="btn-primary" id="spell-apply-btn">Apply</button>
    </div>
  `);
  document.getElementById("spell-cancel-btn").addEventListener("click", closeModal);
  document.getElementById("spell-apply-btn").addEventListener("click", applySpell);
  document.getElementById("spell-input").focus();
}

function applySpell() {
  const raw = document.getElementById("spell-input").value.trim().toUpperCase();
  if (!raw) { closeModal(); return; }
  const letters = raw.replace(/\s+/g, "").split("");
  if (letters.length === 0) { closeModal(); return; }

  const pool = currentTracks.slice();
  const used = new Array(pool.length).fill(false);
  const spelled = [];

  letters.forEach(letter => {
    let foundIndex = -1;
    for (let i = 0; i < pool.length; i++) {
      if (used[i]) continue;
      const firstChar = pool[i].name.trim().charAt(0).toUpperCase();
      if (firstChar === letter) {
        foundIndex = i;
        break;
      }
    }
    if (foundIndex !== -1) {
      used[foundIndex] = true;
      spelled.push(pool[foundIndex]);
    }
  });

  const remaining = pool.filter((t, i) => !used[i]);
  currentTracks = spelled.concat(remaining);
  renderTrackList();
  closeModal();
  showToast("Spelled out " + spelled.length + " of " + letters.length + " letters");
}

async function saveOverwrite() {
  await persistPlaylist(currentPlaylist.id, currentPlaylist.name, false);
}

async function saveAsNew() {
  await persistPlaylist(null, currentPlaylist.name, true);
}

async function persistPlaylist(playlistId, name, isNew) {
  document.getElementById("save-overwrite-btn").disabled = true;
  document.getElementById("save-new-btn").disabled = true;

  try {
    let targetId = playlistId;

    if (isNew) {
      const createRes = await apiFetch(`https://api.spotify.com/v1/users/${userId}/playlists`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: name,
          public: false,
          description: currentPlaylist.description || ""
        })
      });
      if (!createRes.ok) throw new Error("create failed");
      const created = await createRes.json();
      targetId = created.id;
    }

    const uris = currentTracks.map(t => t.uri);
    const localUris = uris.filter(u => u.startsWith("spotify:local:"));
    const remoteUris = uris.filter(u => !u.startsWith("spotify:local:"));

    const firstBatch = remoteUris.slice(0, 100);
    const putRes = await apiFetch(`https://api.spotify.com/v1/playlists/${targetId}/tracks`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uris: firstBatch })
    });
    if (!putRes.ok) throw new Error("update failed");

    for (let i = 100; i < remoteUris.length; i += 100) {
      const batch = remoteUris.slice(i, i + 100);
      await apiFetch(`https://api.spotify.com/v1/playlists/${targetId}/tracks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uris: batch })
      });
    }

    showToast(isNew ? "New playlist saved" : "Playlist updated");
    originalTracks = currentTracks.slice();
  } catch (e) {
    showToast("Something went wrong saving. Try again.");
  } finally {
    document.getElementById("save-overwrite-btn").disabled = false;
    document.getElementById("save-new-btn").disabled = false;
  }
}

document.getElementById("login-btn").addEventListener("click", startLogin);
document.getElementById("back-to-playlists").addEventListener("click", () => {
  document.getElementById("action-bar").style.display = "none";
  showScreen("screen-playlists");
});
document.getElementById("apply-sort-btn").addEventListener("click", applySort);
document.getElementById("reset-btn").addEventListener("click", resetOrder);
document.getElementById("spell-btn").addEventListener("click", openSpellModal);
document.getElementById("save-overwrite-btn").addEventListener("click", saveOverwrite);
document.getElementById("save-new-btn").addEventListener("click", saveAsNew);

init();
</script>
</body>

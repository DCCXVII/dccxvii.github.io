<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Playlist Organizer</title>
<style>
:root { --green: #1DB954; --black: #191414; --base: #121212; --gray: #b3b3b3; --white: #ffffff; --elevated: #282828; --hover: #333333; --danger: #ff5555; }
body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--base); color: var(--white); overflow-x: hidden; }
button { cursor: pointer; border: none; outline: none; background: transparent; color: inherit; font-family: inherit; }
input, select { font-family: inherit; }
#app { padding: 24px; padding-bottom: 120px; max-width: 1400px; margin: 0 auto; }
.hidden { display: none !important; }
.btn-primary { background: var(--green); color: var(--black); font-weight: 700; border-radius: 500px; padding: 14px 32px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; }
.btn-primary:active { transform: scale(0.95); }
.btn-secondary { border: 1px solid var(--gray); border-radius: 500px; padding: 8px 16px; font-size: 14px; color: var(--white); transition: border-color 0.2s; }
.btn-secondary:hover { border-color: var(--white); }
.btn-icon { color: var(--gray); font-size: 20px; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
.btn-icon:hover { color: var(--white); }
.view { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid var(--elevated); padding-bottom: 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
.card { background: var(--elevated); border-radius: 8px; padding: 16px; transition: background 0.2s; cursor: pointer; position: relative; }
.card:hover { background: var(--hover); }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.card h3 { margin: 0 0 8px 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card p { margin: 0; color: var(--gray); font-size: 14px; }
.edit-icon { position: absolute; top: 24px; right: 24px; background: rgba(0,0,0,0.7); border-radius: 50%; width: 32px; height: 32px; display: none; align-items: center; justify-content: center; }
.card:hover .edit-icon { display: flex; }
.track-list { display: flex; flex-direction: column; }
.track-header { display: grid; grid-template-columns: 40px 60px 1fr 200px 120px 60px 40px; align-items: center; padding: 0 16px 8px 16px; border-bottom: 1px solid var(--elevated); color: var(--gray); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.track-item { display: grid; grid-template-columns: 40px 60px 1fr 200px 120px 60px 40px; align-items: center; padding: 8px 16px; border-radius: 4px; transition: background 0.2s; user-select: none; }
.track-item:hover { background: var(--elevated); }
.track-item.dragging { opacity: 0.5; background: var(--hover); }
.handle { cursor: grab; color: var(--gray); font-size: 20px; display: flex; align-items: center; }
.track-number { width: 40px; background: transparent; border: none; color: var(--gray); font-size: 16px; text-align: center; }
.track-number:focus { color: var(--white); outline: 1px solid var(--gray); border-radius: 4px; }
.track-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
.track-info { display: flex; flex-direction: column; overflow: hidden; padding-right: 16px; }
.track-name { font-size: 16px; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.track-artist { font-size: 14px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-album { font-size: 14px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px; }
.track-date, .track-duration { font-size: 14px; color: var(--gray); }
.explicit-badge { background: var(--gray); color: var(--base); font-size: 10px; padding: 2px 4px; border-radius: 2px; margin-right: 6px; display: inline-block; }
.pill-menu { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--elevated); padding: 12px 24px; border-radius: 500px; display: flex; gap: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.8); z-index: 100; flex-wrap: wrap; justify-content: center; width: max-content; max-width: 90vw; }
.pill-btn { background: #3e3e3e; color: var(--white); border-radius: 500px; padding: 8px 16px; font-size: 14px; transition: background 0.2s, color 0.2s; white-space: nowrap; }
.pill-btn:hover { background: #4a4a4a; }
.pill-btn.active { background: var(--green); color: var(--black); font-weight: 600; }
.pill-btn.danger { color: var(--danger); }
.pill-btn.danger:hover { background: var(--danger); color: var(--white); }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.modal { background: var(--elevated); padding: 32px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.modal-header h2 { margin: 0; }
.modal-body { overflow-y: auto; flex-grow: 1; padding-right: 8px; }
.modal-body::-webkit-scrollbar { width: 8px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 4px; }
.modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px; padding-top: 16px; border-top: 1px solid var(--hover); }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; margin-bottom: 8px; color: var(--gray); font-size: 14px; }
.input-group input[type="text"], .input-group input[type="number"], .input-group select { background: var(--hover); border: 1px solid transparent; color: var(--white); padding: 12px 16px; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 16px; transition: border-color 0.2s; }
.input-group input:focus, .input-group select:focus { outline: none; border-color: var(--gray); }
.list-item { display: flex; justify-content: space-between; align-items: center; background: var(--hover); padding: 12px 16px; border-radius: 4px; margin-bottom: 8px; }
.list-item-info { display: flex; flex-direction: column; overflow: hidden; padding-right: 16px; }
#login-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; max-width: 600px; margin: 0 auto; }
#login-view h1 { font-size: 48px; margin-bottom: 16px; }
#login-view p { color: var(--gray); margin-bottom: 40px; line-height: 1.6; font-size: 18px; }
.top-controls { display: flex; gap: 16px; align-items: center; }
.checkbox-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: var(--hover); padding: 12px; border-radius: 4px; }
.checkbox-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--green); }
.dupe-block { margin-bottom: 24px; border: 1px solid var(--hover); border-radius: 8px; overflow: hidden; }
.dupe-header { background: var(--hover); padding: 8px 16px; font-weight: bold; font-size: 14px; }
.dupe-item { padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--hover); }
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: var(--black); padding: 12px 24px; border-radius: 4px; font-weight: bold; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app">
  <div id="login-view" class="view">
    <h1>Organize Your Sound</h1>
    <p>Connect your Spotify account to seamlessly sort, filter, and organize your playlists. Rearrange tracks, remove duplicates, apply bulk rules, and save your perfect order.</p>
    <button class="btn-primary" onclick="login()">Connect Spotify</button>
  </div>

  <div id="playlists-view" class="view hidden">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 16px;">
        <img id="user-avatar" src="" style="width: 48px; height: 48px; border-radius: 50%; display: none;">
        <h2 style="margin: 0;">Your Playlists</h2>
      </div>
      <button class="btn-secondary" onclick="logout()">Disconnect</button>
    </div>
    <div class="grid" id="playlists-grid"></div>
  </div>

  <div id="tracks-view" class="view hidden">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="btn-icon" onclick="showPlaylists()" title="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <img id="current-playlist-img" src="" style="width: 80px; height: 80px; border-radius: 4px; object-fit: cover;">
        <div>
          <h2 id="current-playlist-name" style="margin: 0 0 4px 0;"></h2>
          <p id="current-playlist-info" style="margin: 0; color: var(--gray); font-size: 14px;"></p>
        </div>
      </div>
      <div class="top-controls">
        <button class="btn-icon" onclick="undo()" title="Undo" id="btn-undo" style="opacity: 0.5;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
        </button>
        <button class="btn-icon" onclick="redo()" title="Redo" id="btn-redo" style="opacity: 0.5;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg>
        </button>
        <button class="btn-secondary" onclick="openRemovedWindow()">Removed (<span id="removed-count">0</span>)</button>
        <button class="btn-secondary" onclick="openExcludedWindow()">Excluded Artists</button>
        <button class="btn-primary" onclick="openSaveModal()">Save Playlist</button>
      </div>
    </div>
    <div class="track-header">
      <div></div>
      <div>#</div>
      <div>Title</div>
      <div>Album</div>
      <div>Date Added</div>
      <div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div></div>
    </div>
    <div class="track-list" id="track-list"></div>
    <div class="pill-menu">
      <button class="pill-btn" id="sort-az" onclick="toggleSort('az')">A - Z</button>
      <button class="pill-btn" id="sort-za" onclick="toggleSort('za')">Z - A</button>
      <button class="pill-btn" id="sort-artist" onclick="toggleSort('artist')">Artists</button>
      <button class="pill-btn" id="sort-releaseFirst" onclick="toggleSort('releaseFirst')">Oldest Release</button>
      <button class="pill-btn" id="sort-releaseLatest" onclick="toggleSort('releaseLatest')">Newest Release</button>
      <button class="pill-btn" id="sort-short" onclick="toggleSort('short')">Shortest</button>
      <button class="pill-btn" id="sort-long" onclick="toggleSort('long')">Longest</button>
      <button class="pill-btn" id="sort-album" onclick="toggleSort('album')">Album Order</button>
      <button class="pill-btn" id="sort-addedLatest" onclick="toggleSort('addedLatest')">Added Latest</button>
      <button class="pill-btn" id="sort-addedEarly" onclick="toggleSort('addedEarly')">Added Early</button>
      <button class="pill-btn" onclick="openExplicitModal()">Explicit Options</button>
      <button class="pill-btn" onclick="openRulesModal()">Rules</button>
      <button class="pill-btn danger" onclick="openDuplicatesModal()">Find Duplicates</button>
    </div>
  </div>
</div>

<div id="modal-container"></div>

<script>
const CLIENT_ID = 'fcc60831d3974fec8770b2f9af452de8';
const REDIRECT_URI = 'https://dccxvii.github.io';
const SCOPES = 'playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private user-read-private';

let token = null;
let currentUser = null;
let userPlaylists = [];
let currentPlaylist = null;
let tracks = [];
let historyStack = [];
let redoStack = [];
let removedTracks = [];
let excludedArtistsList = [];
let currentSort = null;
let draggedItemIndex = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 3000);
}

function login() {
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&response_type=token&show_dialog=true`;
  window.location.href = url;
}

function logout() {
  window.location.hash = '';
  window.location.reload();
}

function getHashParams() {
  const hashParams = {};
  let e, r = /([^&;=]+)=?([^&;]*)/g, q = window.location.hash.substring(1);
  while (e = r.exec(q)) {
    hashParams[e] = decodeURIComponent(e);
  }
  return hashParams;
}

async function fetchAPI(endpoint, method = 'GET', body = null) {
  const options = {
    method,
    headers: { 'Authorization': `Bearer ${token}` }
  };
  if (body) {
    options.headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(body);
  }
  const res = await fetch(`https://api.spotify.com/v1${endpoint}`, options);
  if (res.status === 204) return null;
  if (!res.ok) {
    if (res.status === 401) logout();
    throw new Error('API Error');
  }
  return res.json();
}

function init() {
  const params = getHashParams();
  if (params.access_token) {
    token = params.access_token;
    window.location.hash = '';
    loadInitialData();
  } else {
    document.getElementById('login-view').classList.remove('hidden');
  }
}

async function loadInitialData() {
  try {
    document.getElementById('login-view').classList.add('hidden');
    currentUser = await fetchAPI('/me');
    if (currentUser.images && currentUser.images.length > 0) {
      const av = document.getElementById('user-avatar');
      av.src = currentUser.images.url;
      av.style.display = 'block';
    }
    await loadPlaylists();
    document.getElementById('playlists-view').classList.remove('hidden');
  } catch (e) {
    logout();
  }
}

async function loadPlaylists() {
  userPlaylists = [];
  let url = `/me/playlists?limit=50`;
  while (url) {
    const data = await fetchAPI(url.replace('https://api.spotify.com/v1', ''));
    userPlaylists = userPlaylists.concat(data.items);
    url = data.next;
  }
  renderPlaylists();
}

function renderPlaylists() {
  const grid = document.getElementById('playlists-grid');
  grid.innerHTML = '';
  userPlaylists.forEach(p => {
    if (!p) return;
    const div = document.createElement('div');
    div.className = 'card';
    const imgUrl = p.images && p.images.length > 0 ? p.images.url : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" background="%23282828"></svg>';
    div.innerHTML = `
      <img src="${imgUrl}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.tracks.total} tracks</p>
      <div class="edit-icon" onclick="openEditPlaylistModal(event, '${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      </div>
    `;
    div.onclick = () => selectPlaylist(p);
    grid.appendChild(div);
  });
}

function openEditPlaylistModal(e, id) {
  e.stopPropagation();
  const p = userPlaylists.find(x => x && x.id === id);
  if (!p) return;
  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Edit Playlist Details</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="input-group">
            <label>Name</label>
            <input type="text" id="edit-p-name" value="${p.name}">
          </div>
          <div class="input-group">
            <label>Description</label>
            <input type="text" id="edit-p-desc" value="${p.description || ''}">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal(true)">Cancel</button>
          <button class="btn-primary" onclick="savePlaylistDetails('${p.id}')">Save</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

async function savePlaylistDetails(id) {
  const name = document.getElementById('edit-p-name').value;
  const desc = document.getElementById('edit-p-desc').value;
  if (!name) return;
  try {
    await fetchAPI(`/playlists/${id}`, 'PUT', { name, description: desc });
    showToast('Playlist details updated');
    closeModal(true);
    loadPlaylists();
  } catch (e) {
    showToast('Failed to update details');
  }
}

async function selectPlaylist(p) {
  document.getElementById('playlists-view').classList.add('hidden');
  document.getElementById('tracks-view').classList.remove('hidden');
  currentPlaylist = p;
  document.getElementById('current-playlist-name').textContent = p.name;
  document.getElementById('current-playlist-info').textContent = `${p.owner.display_name} • ${p.tracks.total} tracks`;
  document.getElementById('current-playlist-img').src = p.images && p.images.length > 0 ? p.images.url : '';
  
  tracks = [];
  historyStack = [];
  redoStack = [];
  removedTracks = [];
  excludedArtistsList = [];
  currentSort = null;
  updateUndoRedoUI();
  updateRemovedCount();
  resetPillButtons();
  
  let url = `/playlists/${p.id}/tracks?limit=100`;
  while (url) {
    const data = await fetchAPI(url.replace('https://api.spotify.com/v1', ''));
    tracks = tracks.concat(data.items.filter(item => item && item.track && !item.is_local));
    url = data.next;
  }
  
  saveState(true);
  renderTracks();
}

function showPlaylists() {
  document.getElementById('tracks-view').classList.add('hidden');
  document.getElementById('playlists-view').classList.remove('hidden');
}

function saveState(initial = false) {
  if (!initial) {
    historyStack.push({
      tracks: JSON.parse(JSON.stringify(tracks)),
      removed: JSON.parse(JSON.stringify(removedTracks)),
      excluded: JSON.parse(JSON.stringify(excludedArtistsList))
    });
    redoStack = [];
  }
  updateUndoRedoUI();
}

function undo() {
  if (historyStack.length === 0) return;
  redoStack.push({
    tracks: JSON.parse(JSON.stringify(tracks)),
    removed: JSON.parse(JSON.stringify(removedTracks)),
    excluded: JSON.parse(JSON.stringify(excludedArtistsList))
  });
  const state = historyStack.pop();
  tracks = state.tracks;
  removedTracks = state.removed;
  excludedArtistsList = state.excluded;
  updateUndoRedoUI();
  updateRemovedCount();
  renderTracks();
}

function redo() {
  if (redoStack.length === 0) return;
  historyStack.push({
    tracks: JSON.parse(JSON.stringify(tracks)),
    removed: JSON.parse(JSON.stringify(removedTracks)),
    excluded: JSON.parse(JSON.stringify(excludedArtistsList))
  });
  const state = redoStack.pop();
  tracks = state.tracks;
  removedTracks = state.removed;
  excludedArtistsList = state.excluded;
  updateUndoRedoUI();
  updateRemovedCount();
  renderTracks();
}

function updateUndoRedoUI() {
  document.getElementById('btn-undo').style.opacity = historyStack.length > 0 ? '1' : '0.5';
  document.getElementById('btn-redo').style.opacity = redoStack.length > 0 ? '1' : '0.5';
}

function updateRemovedCount() {
  document.getElementById('removed-count').textContent = removedTracks.length;
}

function formatDuration(ms) {
  const minutes = Math.floor(ms / 60000);
  const seconds = ((ms % 60000) / 1000).toFixed(0);
  return minutes + ":" + (seconds < 10 ? '0' : '') + seconds;
}

function formatDate(isoString) {
  const date = new Date(isoString);
  return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function renderTracks() {
  const list = document.getElementById('track-list');
  list.innerHTML = '';
  tracks.forEach((item, index) => {
    const t = item.track;
    const div = document.createElement('div');
    div.className = 'track-item';
    div.draggable = true;
    div.dataset.index = index;
    div.ondragstart = handleDragStart;
    div.ondragover = handleDragOver;
    div.ondrop = handleDrop;
    div.ondragend = handleDragEnd;

    const img = t.album.images && t.album.images.length > 0 ? t.album.images[t.album.images.length-1].url : '';
    const explicit = t.explicit ? `<span class="explicit-badge">E</span>` : '';
    const artists = t.artists.map(a => a.name).join(', ');

    div.innerHTML = `
      <div class="handle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg></div>
      <input type="number" class="track-number" value="${index + 1}" onchange="changeTrackPosition(${index}, this.value)">
      <img src="${img}" class="track-img">
      <div class="track-info">
        <div class="track-name">${explicit}${t.name}</div>
        <div class="track-artist">${artists}</div>
      </div>
      <div class="track-album">${t.album.name}</div>
      <div class="track-date">${formatDate(item.added_at)}</div>
      <div class="track-duration">${formatDuration(t.duration_ms)}</div>
      <button class="btn-icon" onclick="removeTrack(${index})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
    `;
    list.appendChild(div);
  });
}

function changeTrackPosition(oldIndex, newPos) {
  let newIndex = parseInt(newPos) - 1;
  if (isNaN(newIndex) || newIndex < 0) newIndex = 0;
  if (newIndex >= tracks.length) newIndex = tracks.length - 1;
  if (oldIndex === newIndex) return renderTracks();
  saveState();
  const item = tracks.splice(oldIndex, 1);
  tracks.splice(newIndex, 0, item);
  renderTracks();
}

function handleDragStart(e) {
  draggedItemIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
  e.preventDefault();
  const targetElement = e.target.closest('.track-item');
  if (!targetElement) return;
  const targetIndex = parseInt(targetElement.dataset.index);
  if (draggedItemIndex !== null && draggedItemIndex !== targetIndex) {
    saveState();
    const item = tracks.splice(draggedItemIndex, 1);
    tracks.splice(targetIndex, 0, item);
    renderTracks();
  }
}

function handleDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedItemIndex = null;
}

function removeTrack(index) {
  saveState();
  const item = tracks.splice(index, 1);
  removedTracks.push(item);
  updateRemovedCount();
  renderTracks();
}

function closeModal(force = false) {
  if (force || event.target.className === 'modal-overlay') {
    document.getElementById('modal-container').innerHTML = '';
  }
}

function openRemovedWindow() {
  let listHTML = removedTracks.map((item, i) => `
    <div class="list-item">
      <div class="list-item-info">
        <div class="track-name">${item.track.name}</div>
        <div class="track-artist">${item.track.artists.map(a=>a.name).join(', ')}</div>
      </div>
      <button class="btn-secondary" onclick="restoreRemoved(${i})">Add Back</button>
    </div>
  `).join('') || '<p style="color:var(--gray);">No tracks removed.</p>';

  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Removed Tracks</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">${listHTML}</div>
        <div class="modal-footer"><button class="btn-primary" onclick="closeModal(true)">Done</button></div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function restoreRemoved(index) {
  saveState();
  const item = removedTracks.splice(index, 1);
  tracks.push(item);
  updateRemovedCount();
  renderTracks();
  openRemovedWindow();
}

function openExcludedWindow() {
  let listHTML = excludedArtistsList.map((item, i) => `
    <div class="list-item">
      <div class="list-item-info">
        <div class="track-name">${item.track.name}</div>
        <div class="track-artist">${item.track.artists.map(a=>a.name).join(', ')}</div>
      </div>
      <button class="btn-secondary" onclick="restoreExcludedArtist(${i})">Add Back</button>
    </div>
  `).join('') || '<p style="color:var(--gray);">No artists excluded.</p>';

  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Excluded Artists / Tracks</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">${listHTML}</div>
        <div class="modal-footer"><button class="btn-primary" onclick="closeModal(true)">Done</button></div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function restoreExcludedArtist(index) {
  saveState();
  const item = excludedArtistsList.splice(index, 1);
  tracks.push(item);
  renderTracks();
  openExcludedWindow();
}

function openRulesModal() {
  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Filter Rules</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="input-group">
            <label>Exclude Artist (Keyword)</label>
            <input type="text" id="rule-artist" placeholder="e.g. Drake">
          </div>
          <div class="input-group">
            <label>Remove Tracks Shorter Than (Seconds)</label>
            <input type="number" id="rule-short" placeholder="e.g. 120">
          </div>
          <div class="input-group">
            <label>Remove Tracks Longer Than (Seconds)</label>
            <input type="number" id="rule-long" placeholder="e.g. 360">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal(true)">Cancel</button>
          <button class="btn-primary" onclick="applyRules()">Apply Rules</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function applyRules() {
  saveState();
  const artist = document.getElementById('rule-artist').value.toLowerCase();
  const shortSec = parseInt(document.getElementById('rule-short').value);
  const longSec = parseInt(document.getElementById('rule-long').value);
  
  let remaining = [];
  tracks.forEach(item => {
    let exclude = false;
    let toArtistsList = false;

    if (artist && item.track.artists.some(a => a.name.toLowerCase().includes(artist))) {
      exclude = true;
      toArtistsList = true;
    }
    
    const duration = item.track.duration_ms / 1000;
    if (!isNaN(shortSec) && duration < shortSec) exclude = true;
    if (!isNaN(longSec) && duration > longSec) exclude = true;

    if (exclude) {
      if (toArtistsList) excludedArtistsList.push(item);
      else removedTracks.push(item);
    } else {
      remaining.push(item);
    }
  });

  tracks = remaining;
  updateRemovedCount();
  renderTracks();
  closeModal(true);
}

function openExplicitModal() {
  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Explicit Tracks Configuration</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="list-item" style="cursor:pointer;" onclick="sortExplicit('first')">
            <div class="list-item-info"><div class="track-name">Move Explicit Tracks to Top</div></div>
          </div>
          <div class="list-item" style="cursor:pointer;" onclick="sortExplicit('last')">
            <div class="list-item-info"><div class="track-name">Move Explicit Tracks to Bottom</div></div>
          </div>
          <div class="list-item" style="cursor:pointer; background:var(--danger); color:var(--white);" onclick="sortExplicit('remove')">
            <div class="list-item-info"><div class="track-name">Remove All Explicit Tracks</div><p style="margin:0;font-size:12px;">(Moves to Removed List)</p></div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function sortExplicit(action) {
  saveState();
  if (action === 'remove') {
    let remaining = [];
    tracks.forEach(t => t.track.explicit ? removedTracks.push(t) : remaining.push(t));
    tracks = remaining;
    updateRemovedCount();
  } else {
    tracks.sort((a, b) => {
      if (a.track.explicit === b.track.explicit) return 0;
      if (action === 'first') return a.track.explicit ? -1 : 1;
      return a.track.explicit ? 1 : -1;
    });
  }
  renderTracks();
  closeModal(true);
}

function resetPillButtons() {
  document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
}

function toggleSort(type) {
  if (currentSort === type) {
    currentSort = null;
    resetPillButtons();
    return;
  }
  saveState();
  currentSort = type;
  resetPillButtons();
  document.getElementById(`sort-${type}`).classList.add('active');

  const collator = new Intl.Collator('en', { numeric: true, sensitivity: 'base' });

  switch(type) {
    case 'az': tracks.sort((a,b) => collator.compare(a.track.name, b.track.name)); break;
    case 'za': tracks.sort((a,b) => collator.compare(b.track.name, a.track.name)); break;
    case 'artist': tracks.sort((a,b) => collator.compare(a.track.artists.name, b.track.artists.name)); break;
    case 'releaseFirst': tracks.sort((a,b) => (a.track.album.release_date || '').localeCompare(b.track.album.release_date || '')); break;
    case 'releaseLatest': tracks.sort((a,b) => (b.track.album.release_date || '').localeCompare(a.track.album.release_date || '')); break;
    case 'short': tracks.sort((a,b) => a.track.duration_ms - b.track.duration_ms); break;
    case 'long': tracks.sort((a,b) => b.track.duration_ms - a.track.duration_ms); break;
    case 'addedLatest': tracks.sort((a,b) => new Date(b.added_at) - new Date(a.added_at)); break;
    case 'addedEarly': tracks.sort((a,b) => new Date(a.added_at) - new Date(b.added_at)); break;
    case 'album': 
      tracks.sort((a,b) => {
        let cmp = collator.compare(a.track.album.name, b.track.album.name);
        if (cmp !== 0) return cmp;
        if (a.track.disc_number !== b.track.disc_number) return a.track.disc_number - b.track.disc_number;
        return a.track.track_number - b.track.track_number;
      });
      break;
  }
  renderTracks();
}

function openDuplicatesModal() {
  const map = new Map();
  tracks.forEach((item, index) => {
    const t = item.track;
    const key = t.id || `${t.name}-${t.artists.name}-${t.duration_ms}`;
    if (!map.has(key)) map.set(key, []);
    map.get(key).push({ item, index });
  });

  const dupesArr = Array.from(map.values()).filter(arr => arr.length > 1);

  if (dupesArr.length === 0) {
    showToast('No duplicates found!');
    return;
  }

  window.currentDupes = dupesArr;

  let content = dupesArr.map((group, groupIdx) => {
    let itemsHtml = group.map((g, i) => `
      <div class="dupe-item">
        <input type="checkbox" id="dupe-${groupIdx}-${i}" ${i === 0 ? 'checked' : ''}>
        <div class="list-item-info">
          <div class="track-name">${g.item.track.name}</div>
          <div class="track-artist">${g.item.track.artists.name} • ${formatDuration(g.item.track.duration_ms)}</div>
        </div>
      </div>
    `).join('');
    return `
      <div class="dupe-block">
        <div class="dupe-header">Found ${group.length} copies of ${group.item.track.name}</div>
        ${itemsHtml}
      </div>
    `;
  }).join('');

  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Resolve Duplicates</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <p style="color:var(--gray);margin-top:0;">Select the versions you want to KEEP. Unchecked tracks will be removed.</p>
        <div class="modal-body">${content}</div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal(true)">Cancel</button>
          <button class="btn-primary" onclick="executeDuplicatesRemoval()">Confirm Removal</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function executeDuplicatesRemoval() {
  saveState();
  const toKeepIndices = new Set();
  const toRemoveIndices = new Set();

  window.currentDupes.forEach((group, groupIdx) => {
    group.forEach((g, i) => {
      const isChecked = document.getElementById(`dupe-${groupIdx}-${i}`).checked;
      if (isChecked) toKeepIndices.add(g.index);
      else toRemoveIndices.add(g.index);
    });
  });

  let remaining = [];
  tracks.forEach((item, index) => {
    if (toRemoveIndices.has(index)) {
      removedTracks.push(item);
    } else {
      remaining.push(item);
    }
  });

  tracks = remaining;
  updateRemovedCount();
  renderTracks();
  closeModal(true);
  showToast('Duplicates removed.');
}

function openSaveModal() {
  let options = userPlaylists.filter(p => p && p.owner.id === currentUser.id).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  
  const modalHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Save Playlist</h2>
          <button class="btn-icon" onclick="closeModal(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="input-group">
            <label>Save Method</label>
            <select id="save-method" onchange="toggleSaveMethod()">
              <option value="overwrite-current">Overwrite Current Playlist (${currentPlaylist.name})</option>
              <option value="overwrite-other">Overwrite Another Playlist</option>
              <option value="create-new">Create New Playlist</option>
            </select>
          </div>
          <div class="input-group hidden" id="group-other">
            <label>Select Playlist to Overwrite</label>
            <select id="save-other-id">${options}</select>
          </div>
          <div class="input-group hidden" id="group-new">
            <label>New Playlist Name</label>
            <input type="text" id="save-new-name" placeholder="My Organized Playlist">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal(true)">Cancel</button>
          <button class="btn-primary" id="btn-execute-save" onclick="executeSave()">Save to Spotify</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modalHTML;
}

function toggleSaveMethod() {
  const method = document.getElementById('save-method').value;
  document.getElementById('group-other').classList.toggle('hidden', method !== 'overwrite-other');
  document.getElementById('group-new').classList.toggle('hidden', method !== 'create-new');
}

async function executeSave() {
  const method = document.getElementById('save-method').value;
  const btn = document.getElementById('btn-execute-save');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  try {
    let targetId = currentPlaylist.id;
    if (method === 'overwrite-other') {
      targetId = document.getElementById('save-other-id').value;
    } else if (method === 'create-new') {
      const name = document.getElementById('save-new-name').value || 'New Organized Playlist';
      const created = await fetchAPI(`/users/${currentUser.id}/playlists`, 'POST', { name, description: 'Organized with Sound Organizer' });
      targetId = created.id;
    }

    const uris = tracks.map(t => t.track.uri).filter(Boolean);
    
    if (method !== 'create-new') {
      await fetchAPI(`/playlists/${targetId}/tracks`, 'PUT', { uris: uris.slice(0, 100) });
      for (let i = 100; i < uris.length; i += 100) {
        await fetchAPI(`/playlists/${targetId}/tracks`, 'POST', { uris: uris.slice(i, i + 100) });
      }
    } else {
      for (let i = 0; i < uris.length; i += 100) {
        await fetchAPI(`/playlists/${targetId}/tracks`, 'POST', { uris: uris.slice(i, i + 100) });
      }
    }

    showToast('Playlist Saved Successfully!');
    closeModal(true);
    await loadPlaylists();
  } catch (e) {
    showToast('Error saving playlist. Check console.');
    console.error(e);
  } finally {
    btn.textContent = 'Save to Spotify';
    btn.disabled = false;
  }
}

window.onload = init;
</script>

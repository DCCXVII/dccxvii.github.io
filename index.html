<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify - Connect</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #121212;
      --elevated: #181818;
      --elevated-hover: #282828;
      --text: #ffffff;
      --subtext: #b3b3b3;
      --accent: #1db954;
      --accent-hover: #1ed760;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 160px;
      height: 160px;
      margin-bottom: 24px;
    }
    .logo svg { width: 100%; height: 100%; }
    .title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--subtext); margin-bottom: 32px; font-size: 1rem; }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 48px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.04); }
    .btn:active { transform: scale(0.98); }

    /* Main Screen */
    #main-screen {
      display: none;
      height: 100vh;
      overflow: hidden;
    }
    .topbar {
      height: 64px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid #282828;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .topbar-left svg { width: 32px; height: 32px; fill: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .user-name { color: var(--subtext); font-size: 0.9rem; }
    .logout-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid #535353;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .logout-btn:hover { border-color: var(--text); }

    .content {
      height: calc(100vh - 64px);
      overflow-y: auto;
      background: linear-gradient(180deg, #1e1e1e 0%, var(--surface) 280px);
      padding: 32px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-title { font-size: 1.5rem; font-weight: 700; }

    .refresh-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid #535353;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .refresh-btn:hover { border-color: var(--text); background: rgba(255,255,255,0.05); }
    .refresh-btn svg { width: 18px; height: 18px; fill: currentColor; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn.spin svg { animation: spin 0.6s linear; }

    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 24px;
    }
    .playlist-card {
      background: var(--elevated);
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .playlist-card:hover { background: var(--elevated-hover); }
    .playlist-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      background: #333;
    }
    .playlist-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .playlist-meta {
      color: var(--subtext);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state { color: var(--subtext); padding: 40px 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="logo">
      <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1DB954" d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
      </svg>
    </div>
    <div class="title">Connect to Spotify</div>
    <div class="subtitle">Sign in to view your playlists.</div>
    <button class="btn" id="connect-btn">Connect Account</button>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <div class="topbar">
      <div class="topbar-left">
        <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <path d="M84 0C37.8 0 0 37.8 0 84s37.8 84 84 84 84-37.8 84-84S130.2 0 84 0zm38.5 121.2c-1.5 2.5-4.7 3.2-7 1.7-19.2-11.7-43.3-14.3-71.8-7.9-2.7.6-5.4-1.1-6-3.8-.6-2.7 1.1-5.4 3.8-6 31.3-7.1 58.2-4.1 79.7 9 2.3 1.4 3 4.5 1.5 6.9zm10.2-22.8c-1.8 3-5.6 3.9-8.6 2.1-22-13.5-55.5-17.4-81.4-9.5-3.3 1-6.8-.9-7.8-4.2-1-3.3.9-6.8 4.2-7.8 29.6-9 66.5-4.7 91.4 10.8 3 1.9 3.9 5.6 2.1 8.6zm.9-23.6c-26.3-15.6-69.7-17-94.7-9.4-4 1.2-8.2-1-9.4-5.1-1.2-4 1-8.2 5.1-9.4 28.6-8.7 76.1-7.1 105.8 10.5 3.6 2.1 4.7 6.8 2.6 10.4-2.1 3.6-6.7 4.7-10.4 2.6z"/>
        </svg>
        Spotify
      </div>
      <div class="topbar-right">
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>

    <div class="content">
      <div class="section-header">
        <div class="section-title">Your Playlists</div>
        <button class="refresh-btn" id="refresh-btn" title="Refresh playlists">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
      </div>
      <div id="playlist-grid" class="playlist-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none;">No playlists found.</div>
      <div id="status-msg" style="color: var(--subtext); font-size: 0.85rem; margin-top: 8px; min-height: 1.2em;"></div>
    </div>
  </div>

  <script>
    // Spotify Config
    const CLIENT_ID = 'fcc60831d3974fec8770b2f9af452de8';
    const REDIRECT_URI = 'https://dccxvii.github.io';
    const AUTH_URL = 'https://accounts.spotify.com/authorize';
    const TOKEN_URL = 'https://accounts.spotify.com/api/token';
    const API_URL = 'https://api.spotify.com/v1';

    // PKCE Helpers
    function generateRandomString(length) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      let text = '';
      for (let i = 0; i < length; i++) {
        text += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return text;
    }

    async function sha256(plain) {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      return window.crypto.subtle.digest('SHA-256', data);
    }

    function base64urlencode(a) {
      let str = '';
      const bytes = new Uint8Array(a);
      for (let i = 0; i < bytes.byteLength; i++) str += String.fromCharCode(bytes[i]);
      return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(v) {
      return base64urlencode(await sha256(v));
    }

    // DOM Refs
    const loginScreen = document.getElementById('login-screen');
    const mainScreen = document.getElementById('main-screen');
    const playlistGrid = document.getElementById('playlist-grid');
    const emptyState = document.getElementById('empty-state');
    const userNameEl = document.getElementById('user-name');
    const refreshBtn = document.getElementById('refresh-btn');
    const statusMsg = document.getElementById('status-msg');

    // State
    let currentToken = null;
    let pollInterval = null;

    function showLogin() {
      loginScreen.style.display = 'flex';
      mainScreen.style.display = 'none';
    }

    function showMain() {
      loginScreen.style.display = 'none';
      mainScreen.style.display = 'block';
    }

    function startPolling() {
      stopPolling();
      if (!currentToken) return;
      pollInterval = setInterval(() => {
        loadPlaylists(currentToken, true);
      }, 5000); // Live-ish update every 5 seconds
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    // Pause polling when tab hidden, resume when visible
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentToken) {
        loadPlaylists(currentToken, true); // instant catch-up
        startPolling();
      } else {
        stopPolling();
      }
    });

    // AUTH: Connect button
    document.getElementById('connect-btn').addEventListener('click', async () => {
      const verifier = generateRandomString(128);
      localStorage.setItem('spotify_code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      const params = new URLSearchParams({
        client_id: CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        show_dialog: 'true', // Force user to see Spotify approval screen every time
        scope: 'user-read-private playlist-read-private playlist-read-collaborative'
      });
      window.location.href = `${AUTH_URL}?${params.toString()}`;
    });

    // Handle OAuth callback / existing session on load
    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');

      if (error) {
        alert('Authorization error: ' + error);
        showLogin();
        return;
      }

      const storedToken = localStorage.getItem('spotify_access_token');

      if (code && !storedToken) {
        const verifier = localStorage.getItem('spotify_code_verifier');
        if (!verifier) { showLogin(); return; }

        try {
          const res = await fetch(TOKEN_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: CLIENT_ID,
              grant_type: 'authorization_code',
              code: code,
              redirect_uri: REDIRECT_URI,
              code_verifier: verifier
            })
          });
          if (!res.ok) throw new Error('Token exchange failed: ' + res.status);
          const data = await res.json();
          const token = data.access_token;
          localStorage.setItem('spotify_access_token', token);
          localStorage.removeItem('spotify_code_verifier');
          window.history.replaceState({}, document.title, REDIRECT_URI);
          currentToken = token;
          showMain();
          initDashboard(token);
        } catch (e) {
          console.error(e);
          localStorage.removeItem('spotify_code_verifier');
          showLogin();
        }
      } else if (storedToken) {
        currentToken = storedToken;
        showMain();
        initDashboard(storedToken);
      } else {
        showLogin();
      }
    });

    async function initDashboard(token) {
      await loadUser(token);
      await loadPlaylists(token);
      if (document.visibilityState === 'visible') startPolling();
    }

    async function loadUser(token) {
      try {
        const res = await fetch(`${API_URL}/me`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        userNameEl.textContent = data.display_name || data.id;
      } catch {
        userNameEl.textContent = 'Listener';
      }
    }

    async function loadPlaylists(token, silent = false) {
      if (!token) return;
      try {
        if (!silent) statusMsg.textContent = 'Loading…';
        const res = await fetch(`${API_URL}/me/playlists?limit=50`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.status === 401) {
          // Token expired / revoked
          handleLogout();
          return;
        }

        if (!res.ok) throw new Error();

        const data = await res.json();
        playlistGrid.innerHTML = '';

        if (!data.items || data.items.length === 0) {
          emptyState.style.display = 'block';
          statusMsg.textContent = '';
          return;
        }
        emptyState.style.display = 'none';

        data.items.forEach(pl => {
          const card = document.createElement('div');
          card.className = 'playlist-card';
          const imgUrl = (pl.images && pl.images.length) ? pl.images[0].url : 'https://via.placeholder.com/300x300/181818/b3b3b3?text=Playlist';
          card.innerHTML = `
            <img class="playlist-img" src="${imgUrl}" alt="${pl.name}" loading="lazy">
            <div class="playlist-name">${pl.name}</div>
            <div class="playlist-meta">By ${pl.owner.display_name || pl.owner.id} • ${pl.tracks.total} tracks</div>
          `;
          playlistGrid.appendChild(card);
        });

        statusMsg.textContent = silent ? '' : 'Updated just now';
        setTimeout(() => { if (statusMsg.textContent === 'Updated just now') statusMsg.textContent = ''; }, 2000);
      } catch (e) {
        console.error(e);
        if (!silent) statusMsg.textContent = 'Unable to load playlists.';
      }
    }

    // Manual refresh button
    refreshBtn.addEventListener('click', () => {
      if (currentToken) {
        refreshBtn.classList.add('spin');
        loadPlaylists(currentToken).then(() => {
          setTimeout(() => refreshBtn.classList.remove('spin'), 600);
        });
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', handleLogout);

    function handleLogout() {
      stopPolling();
      currentToken = null;
      localStorage.removeItem('spotify_access_token');
      localStorage.removeItem('spotify_code_verifier');
      playlistGrid.innerHTML = '';
      userNameEl.textContent = '';
      statusMsg.textContent = '';
      showLogin();
    }
  </script>
</body>
</html>
